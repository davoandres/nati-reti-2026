<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>NATI-RETI 2026 · Where Now for Visible Justice?</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --navy:#0A1C3E;
  --blue:#1B3B6F;
  --mid:#2E5FA3;
  --gold:#C8A46A;
  --cream:#F5F3EE;
  --off:#FAFAF7;
  --text:#18182E;
  --muted:#4A4A6A;
  --rule:#D8D8E8;
  --PW:560px;
  --PH:730px;
}

html,body{
  width:100%;height:100%;
  background:#F5F5F5;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:18px;overflow:hidden;
  font-family:'Lora',Georgia,serif;
}

/* ══════════════════════════════════════════
   BOOK (StPageFlip)
══════════════════════════════════════════ */
.scene{
  width:calc(var(--PW)*2);
  height:var(--PH);
}
#book{
  width:100%;height:100%;
  box-shadow:
    0 2px 8px rgba(0,0,0,.25),
    0 20px 60px rgba(0,0,0,.65),
    0 50px 110px rgba(0,0,0,.45);
}
/* StPageFlip's generated page blocks — let our .pg fill them */
.stf__block{background:transparent;}
.stf-page{width:100%;height:100%;}

/* ══════════════════════════════════════════
   PAGE BASES
══════════════════════════════════════════ */
.pg{width:var(--PW);height:var(--PH);position:relative;overflow:hidden;font-family:'Lora',serif;}

/* ── COVER ── */
.pg-cover{
  background:linear-gradient(155deg,#1B3B6F 0%,#0A1C3E 100%);
  color:#fff;
  display:flex;flex-direction:column;align-items:center;
  padding:18px 48px 28px;text-align:center;
}
.cover-logo-wrap{margin-bottom:14px;}
.cover-logo{width:420px;display:block;}
.cover-eyebrow{
  font-family:'Inter',sans-serif;font-size:9px;font-weight:600;
  letter-spacing:.22em;text-transform:uppercase;
  color:rgba(255,255,255,.55);margin-bottom:16px;
}
.cover-title{
  font-family:'Playfair Display',serif;font-size:46px;font-weight:700;
  font-style:italic;line-height:1.08;color:#fff;
  margin-bottom:22px;max-width:400px;
}
.cover-rule{width:44px;height:2px;background:var(--gold);margin:0 auto 20px;}
.cover-program{
  font-family:'Inter',sans-serif;font-size:11px;font-weight:500;
  letter-spacing:.1em;text-transform:uppercase;
  color:rgba(255,255,255,.82);line-height:2;margin-bottom:8px;
}
.cover-city{
  font-family:'Inter',sans-serif;font-size:9.5px;font-weight:300;
  letter-spacing:.1em;color:rgba(255,255,255,.62);margin-top:6px;
}
.cover-footer{
  margin-top:28px;
  font-family:'Inter',sans-serif;font-size:8.5px;
  letter-spacing:.04em;color:rgba(255,255,255,.52);
  line-height:1.85;
}

/* ── INSIDE COVER ── */
.pg-inside{
  background:linear-gradient(to right,#040D1A 0%,#0A1C3E 100%);
}

/* ── INTERIOR BASE ── */
.pg-int{
  background:var(--off);color:var(--text);
  padding:38px 42px 26px;
  display:flex;flex-direction:column;
}
.pg-int.cream{background:var(--cream);}

/* Page number footer */
.pn{
  font-family:'Inter',sans-serif;font-size:8px;letter-spacing:.14em;
  color:#999;margin-top:auto;padding-top:14px;
  border-top:1px solid var(--rule); /* pillar color set inline per page */
  display:flex;justify-content:space-between;align-items:center;
  flex-shrink:0;
}

/* ── FULL-PHOTO PAGE (section opener) ── */
.pg-photo{
  position:relative;overflow:hidden;
  background:#0A1C3E;
}
.photo-fill{position:absolute;inset:0;z-index:0;}
.photo-fill img{
  width:100%;height:100%;
  object-fit:cover;object-position:center;
}
.photo-fill::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(
    to top,
    rgba(8,18,46,.96) 0%,
    rgba(8,18,46,.72) 42%,
    rgba(8,18,46,.28) 100%
  );
}
.photo-text{
  position:absolute;bottom:0;left:0;right:0;
  z-index:1;padding:40px 44px 44px;
}
.photo-text .op-label{
  font-family:'Inter',sans-serif;font-size:9px;font-weight:700;
  letter-spacing:.24em;text-transform:uppercase;
  color:var(--gold);margin-bottom:12px;
}
.photo-text .op-rule{width:36px;height:2px;background:var(--gold);margin-bottom:20px;}
.photo-text .op-title{
  font-family:'Playfair Display',serif;font-size:48px;font-weight:700;
  line-height:1.06;color:#fff;margin-bottom:16px;
}
.photo-text .op-desc{
  font-family:'Lora',serif;font-size:12px;line-height:1.74;
  color:rgba(255,255,255,.62);max-width:380px;
}

/* ── HALF-PHOTO PAGE ── */
.pg-half{
  background:var(--off);
  display:flex;flex-direction:column;
}
.half-photo{height:48%;overflow:hidden;position:relative;flex-shrink:0;}
.half-photo img{
  width:100%;height:100%;object-fit:cover;object-position:center 30%;
}
.half-photo::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to top,rgba(250,250,247,.6) 0%,transparent 50%);
}
.half-body{
  flex:1;min-height:0;
  padding:28px 44px 32px;
  display:flex;flex-direction:column;
  overflow:hidden;
}

/* ── PILLAR 1 — CLIMATE JUSTICE (#3D993D) ── */
.pg-p1{ background:#F1F7F1; display:flex; flex-direction:column; overflow:hidden; }
.p1-photo{ height:56%; flex-shrink:0; overflow:hidden; position:relative; }
.p1-photo img{ width:100%; height:100%; object-fit:cover; object-position:center 25%; }
.p1-text{ flex:1; padding:22px 42px 28px; display:flex; flex-direction:column; justify-content:space-between; background:#F1F7F1; }
.p1-num{ font-family:'Inter',sans-serif; font-size:8.5px; font-weight:700; letter-spacing:.26em; text-transform:uppercase; color:#77B777; margin-bottom:8px; }
.p1-title{ font-family:'Playfair Display',serif; font-size:36px; font-weight:700; line-height:1.1; color:#3D993D; margin-bottom:10px; }
.p1-rule{ width:34px; height:2px; background:#77B777; margin-bottom:10px; }
.p1-tagline{ font-family:'Lora',serif; font-size:11.5px; line-height:1.7; color:var(--muted); max-width:370px; }
.p1-pn{ font-family:'Inter',sans-serif; font-size:8px; letter-spacing:.14em; color:#999; padding-top:12px; border-top:1px solid #CEE5CE; display:flex; justify-content:space-between; }

/* ══════════════════════════════════════════
   INTERIOR TYPOGRAPHY SYSTEM
══════════════════════════════════════════ */

/* Section label */
.sl{
  font-family:'Inter',sans-serif;font-size:8.5px;font-weight:600;
  letter-spacing:.22em;text-transform:uppercase;
  color:var(--mid);margin-bottom:8px;flex-shrink:0;
}

/* Display heading */
.dh{
  font-family:'Playfair Display',serif;
  font-size:22px;font-weight:700;line-height:1.22;
  color:var(--text);margin-bottom:14px;flex-shrink:0;
}

/* Rule accent */
.ra{width:28px;height:2px;background:var(--mid);margin-bottom:12px;flex-shrink:0;}

/* Body text */
.bt{
  font-family:'Lora',serif;font-size:11.5px;line-height:1.7;
  color:var(--muted);
}
.bt+.bt{margin-top:9px;}

/* Large pull quote */
.lpq{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:17px;line-height:1.52;color:var(--blue);
  padding:18px 0 18px 22px;
  border-left:3px solid var(--gold);
  margin:16px 0;flex-shrink:0;
}

/* Subtle pull quote */
.spq{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:13px;line-height:1.6;color:var(--muted);
  padding:12px 0 12px 18px;
  border-left:2px solid var(--gold);
  margin:12px 0;flex-shrink:0;
}

/* ── NUMBERED OBJECTIVES ── */
.obj-block{
  display:flex;gap:16px;
  padding:10px 0;
  border-bottom:1px solid var(--rule);
  flex-shrink:0;
}
.obj-block:first-of-type{border-top:1px solid var(--rule);}
.obj-n{
  font-family:'Playfair Display',serif;
  font-size:32px;font-weight:700;
  color:rgba(46,95,163,.18);
  line-height:1;flex-shrink:0;
  width:38px;padding-top:4px;
}
.obj-t{font-family:'Lora',serif;font-size:11.5px;line-height:1.68;color:var(--muted);}

/* ── METHODOLOGY — drop-cap word style ── */
.tier-editorial{
  padding:10px 0;
  border-bottom:1px solid var(--rule);
  flex-shrink:0;
}
.tier-editorial:first-of-type{border-top:1px solid var(--rule);}
/* The tier word: big first letter inline with the rest */
.tier-word{
  display:block;
  font-family:'Playfair Display',serif;
  font-style:italic;
  line-height:1;
  margin-bottom:7px;
}
.tw-cap{
  font-size:44px;font-weight:700;
  color:var(--blue);
  line-height:.85;
  vertical-align:-0.08em;
}
.tw-rest{
  font-size:15px;font-weight:400;
  color:var(--mid);letter-spacing:.04em;
}
.tier-body{
  font-family:'Lora',serif;font-size:11px;line-height:1.58;
  color:var(--muted);
}

/* ── PRACTICES LIST ── */
.prac-item{
  display:flex;gap:14px;
  padding:6px 0;border-bottom:1px solid var(--rule);flex-shrink:0;
}
.prac-item:first-of-type{border-top:1px solid var(--rule);}
.prac-n{
  font-family:'Inter',sans-serif;font-size:9px;font-weight:700;
  color:var(--mid);letter-spacing:.08em;flex-shrink:0;width:18px;
}
.prac-t{font-family:'Lora',serif;font-size:10.5px;line-height:1.55;color:var(--muted);}
.prac-t strong{color:var(--text);font-weight:500;}

/* ── GUIDING QUESTIONS ── */
.q-block{
  padding:7px 0;border-bottom:1px solid var(--rule);
  display:flex;gap:14px;flex-shrink:0;
}
.q-block:first-of-type{border-top:1px solid var(--rule);}
.q-n{
  font-family:'Playfair Display',serif;font-size:20px;font-weight:700;
  color:rgba(46,95,163,.2);line-height:1;flex-shrink:0;width:26px;padding-top:1px;
}
.q-t{
  font-family:'Lora',serif;font-style:italic;
  font-size:11px;line-height:1.56;color:var(--muted);
}

/* ── THEMES LIST ── */
.theme-item{
  font-family:'Lora',serif;font-size:10.5px;line-height:1.5;
  color:var(--muted);
  padding:4px 0 4px 16px;position:relative;
  border-bottom:1px solid rgba(216,216,232,.6);flex-shrink:0;
}
.theme-item::before{
  content:'';position:absolute;left:0;top:50%;
  transform:translateY(-50%);
  width:5px;height:5px;border-radius:50%;
  background:var(--gold);
}

/* ── ACTIVITIES ── */
.act-item{
  padding:6px 0;border-bottom:1px solid var(--rule);
  display:grid;grid-template-columns:1fr 82px;gap:8px;flex-shrink:0;
}
.act-item:first-of-type{border-top:1px solid var(--rule);}
.act-d{font-family:'Lora',serif;font-size:10.5px;line-height:1.48;color:var(--muted);}
.act-f{
  font-family:'Inter',sans-serif;font-size:8px;font-weight:600;
  color:var(--mid);text-align:right;line-height:1.45;
  text-transform:uppercase;letter-spacing:.06em;
}

/* ── BIBLICAL ANCHORS ── */
.anch{padding:8px 0;border-bottom:1px solid var(--rule);flex-shrink:0;}
.anch:first-of-type{border-top:1px solid var(--rule);}
.anch-ref{
  font-family:'Playfair Display',serif;font-size:12px;font-weight:600;
  color:var(--blue);margin-bottom:4px;
}
.anch-txt{font-family:'Lora',serif;font-size:10.5px;line-height:1.52;color:var(--muted);}

/* ── READINGS ── */
.rd{
  padding:5px 0;border-bottom:1px solid var(--rule);
  font-family:'Lora',serif;font-size:10px;line-height:1.5;color:var(--muted);
  flex-shrink:0;
}
.rn{font-family:'Inter',sans-serif;font-size:9px;font-weight:700;color:var(--mid);}

/* Sub-heading */
.sub-h{
  font-family:'Inter',sans-serif;font-size:8.5px;font-weight:700;
  letter-spacing:.16em;text-transform:uppercase;color:var(--mid);
  margin-top:10px;margin-bottom:4px;flex-shrink:0;
}

/* TOC */
.toc-row{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:5px 0;border-bottom:1px solid var(--rule);
}
.toc-t{font-family:'Lora',serif;font-size:11.5px;color:var(--muted);}
.toc-t.pillar{
  font-weight:500;color:var(--blue);font-size:12px;
}
.toc-p{
  font-family:'Inter',sans-serif;font-size:9px;
  color:#bbb;padding-left:10px;flex-shrink:0;
}
.toc-gap{height:10px;}

/* Closing */
.pg-closing{
  background:var(--blue);
  background-image:linear-gradient(145deg,#1B3B6F 0%,#0A1C3E 100%);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:48px;color:#fff;
}
.cl-logo{width:120px;opacity:.5;margin-bottom:30px;}
.cl-lbl{
  font-family:'Inter',sans-serif;font-size:9px;font-weight:700;
  letter-spacing:.22em;text-transform:uppercase;
  color:var(--gold);margin-bottom:14px;
}
.cl-title{
  font-family:'Playfair Display',serif;font-size:26px;
  font-weight:700;line-height:1.2;color:#fff;
  margin-bottom:18px;max-width:300px;
}
.cl-rule{width:36px;height:2px;background:var(--gold);margin:0 auto 18px;}
.cl-desc{
  font-family:'Lora',serif;font-size:12px;line-height:1.74;
  color:rgba(255,255,255,.56);max-width:280px;
}

/* ══════════════════════════════════════════
   PILLAR 2 — SECULARISM & LAICITY (#A3A3A3)
══════════════════════════════════════════ */

.p2-title{ font-family:'Playfair Display',serif; font-size:36px; font-weight:700; line-height:1.1; color:#A3A3A3; margin-bottom:10px; }

.p2-tagline{ font-family:'Lora',serif; font-size:11.5px; line-height:1.7; color:var(--muted); max-width:370px; }

/* ══════════════════════════════════════════
   NAV BAR
══════════════════════════════════════════ */
.nav-bar{
  display:flex;align-items:center;gap:18px;
  position:relative;z-index:200;
}
.nb{
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.13);
  color:rgba(255,255,255,.75);
  width:40px;height:40px;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;font-size:14px;
}
.nb:hover:not(:disabled){
  background:rgba(255,255,255,.14);
  border-color:rgba(255,255,255,.26);color:#fff;
}
.nb:disabled{opacity:.2;cursor:default;}
.nb-skip{font-size:16px;opacity:.55;}
.nb-skip:not(:disabled):hover{opacity:1;}
.ni{
  font-family:'Inter',sans-serif;font-size:10px;
  color:rgba(255,255,255,.32);letter-spacing:.08em;

.pd::after{
  content:attr(data-label);
  position:absolute;
  bottom:calc(100% + 10px);
  left:50%;
  transform:translateX(-50%) translateY(4px);
  background:rgba(10,28,62,.95);

}
.pd::before{
  content:'';
  position:absolute;
  bottom:calc(100% + 4px);
  left:50%;
  transform:translateX(-50%) translateY(4px);
  border:5px solid transparent;
  border-top-color:rgba(10,28,62,.95);
  opacity:0;
  pointer-events:none;

const bookEl   = document.getElementById('book');
const btnP     = document.getElementById('btnP');
const btnN     = document.getElementById('btnN');
const btnFirst = document.getElementById('btnFirst');
const btnLast  = document.getElementById('btnLast');
const info     = document.getElementById('info');

const N = SPREADS.length;

function buildPages(){
  const pages = [];
  for(let s=0; s<N; s++){
    const [L, R] = SPREADS[s];
    const pl = document.createElement('div');
    pl.className = 'stf-page';
    pl.innerHTML = L();
    pages.push(pl);
    const pr = document.createElement('div');
    pr.className = 'stf-page';
    pr.innerHTML = R();
    pages.push(pr);
  }
  return pages;
}

/* Cache page HTML strings for the mobile backward-flip overlay */
const pageHTMLs = (() => {
  const out = [];
  for(let s=0; s<N; s++){
    const [L, R] = SPREADS[s];
    out.push(L(), R());
  }
  return out;
})();

const isMobile = window.innerWidth < 900;

const pageFlip = new St.PageFlip(bookEl, {
  width: 560,
  height: 730,
  size: 'fixed',
  minWidth: 315,
  maxWidth: 1120,
  minHeight: 420,
  maxHeight: 1460,
  maxShadowOpacity: 0.5,
  showCover: false,
  usePortrait: isMobile,
  mobileScrollSupport: true,
  drawShadow: true,
  flippingTime: 900,
  useMouseEvents: true,
  swipeDistance: 30
});

pageFlip.loadFromHTML(buildPages());

// On mobile (portrait mode), skip the dark-blue inside cover and start on the actual cover
if(isMobile){
  requestAnimationFrame(() => pageFlip.turnToPage(1));
}

function currentSpread(){
  return Math.floor(pageFlip.getCurrentPageIndex() / 2);
}
let _suppressNav = false;
function updateNav(){
  if(_suppressNav) return;
  const s = currentSpread();
  btnP.disabled     = (s<=0);
  btnN.disabled     = (s>=N-1);
  btnFirst.disabled = (s<=0);
  btnLast.disabled  = (s>=N-1);
  info.textContent  = (s+1)+' / '+N;
}
pageFlip.on('flip', function(e) {
  updateNav();
  const sound = document.getElementById('flipSound');
  if (sound) {
    sound.currentTime = 0;
    sound.play().catch(err => console.log('Audio play suppressed:', err));
  }
});
updateNav();

const sceneEl = document.querySelector('.scene');
let _animating = false;

/* Mobile backward: simple slow horizontal slide. The current page is
   cloned as an overlay that slides off to the right, revealing the
   target page (set silently on the book beneath). No fold, no rotation
   — just a clean translate. */
function playBackFoldAnim(fromIdx, targetIdx){
  if(_animating) return;
  _animating = true;
  _suppressNav = true;

  const rect = bookEl.getBoundingClientRect();
  const scale = rect.width / 560;
  const duration = 1400;

  const overlay = document.createElement('div');
  overlay.style.cssText = `
    position:fixed;
    left:${rect.left}px; top:${rect.top}px;
    width:${rect.width}px; height:${rect.height}px;
    overflow:hidden;
    pointer-events:none;
    z-index:99999;
    box-shadow:-6px 0 18px rgba(0,0,0,.25);
    transition:transform ${duration}ms ease-in-out;
    transform:translateX(0);
    background:#fff;
  `;

  const content = document.createElement('div');
  content.style.cssText = `
    width:560px; height:730px;
    transform-origin:top left;
    transform:scale(${scale});
  `;
  content.innerHTML = `<div class="stf-page" style="width:100%;height:100%;">${pageHTMLs[fromIdx] || ''}</div>`;
  overlay.appendChild(content);

  document.body.appendChild(overlay);
  pageFlip.turnToPage(targetIdx);

  requestAnimationFrame(() => requestAnimationFrame(() => {
    overlay.style.transform = `translateX(${rect.width}px)`;
  }));

  setTimeout(() => {
    overlay.remove();
    _animating = false;
    _suppressNav = false;
    updateNav();
  }, duration + 50);
}

function go(dir){
  if(_animating) return;
  if(!isMobile){
    if(dir > 0) pageFlip.flipNext();
    else pageFlip.flipPrev();
    return;
  }
  const cur = pageFlip.getCurrentPageIndex();
  if(dir > 0){
    /* Forward on mobile: the double-turnToPage trick forces StPageFlip
       to rebuild its render state, which produces the rich fold look
       instead of a flat rotation. Both turnToPages run while the scene
       is hidden so the user never sees the page jump. */
    if(cur >= (N*2 - 1)) return;
    _suppressNav = true;
    sceneEl.style.visibility = 'hidden';
    pageFlip.turnToPage(cur - 1 >= 0 ? cur - 1 : cur + 1);
    pageFlip.turnToPage(cur);
    requestAnimationFrame(() => requestAnimationFrame(() => {
      sceneEl.style.visibility = '';
      _suppressNav = false;
      pageFlip.flipNext();
    }));
    return;
  }
  /* Backward on mobile: custom CSS overlay that rotates left-to-right. */
  const target = cur - 1;
  if(target < 1) return;
  playBackFoldAnim(cur, target);
}
function goTo(spreadIdx){
  if(spreadIdx<0 || spreadIdx>=N) return;
  pageFlip.turnToPage(spreadIdx * 2);
}
window.go = go;
window.goTo = goTo;

/* Read Mode: fullscreen modal showing the current page only, so the
   browser's native pinch-zoom works without StPageFlip interference. */
function openReadMode(){
  if(document.getElementById('readModal')) return;
  const idx = pageFlip.getCurrentPageIndex();
  const availW = window.innerWidth - 32;
  const availH = window.innerHeight - 110;
  const scale = Math.min(availW / 560, availH / 730, 1.1);

  const modal = document.createElement('div');
  modal.id = 'readModal';
  modal.className = 'read-modal';

  const closeBtn = document.createElement('button');
  closeBtn.className = 'read-modal-close';
  closeBtn.setAttribute('aria-label', 'Cerrar');
  closeBtn.innerHTML = '&times;';
  closeBtn.onclick = closeReadMode;

  const hint = document.createElement('div');
  hint.className = 'read-modal-hint';
  hint.textContent = 'Pinch to zoom';

  const frame = document.createElement('div');
  frame.className = 'read-modal-frame';
  frame.style.width = (560 * scale) + 'px';
  frame.style.height = (730 * scale) + 'px';

  const inner = document.createElement('div');
  inner.className = 'read-modal-inner';
  inner.style.transform = `scale(${scale})`;
  inner.innerHTML = `<div class="stf-page" style="width:var(--PW);height:var(--PH);">${pageHTMLs[idx] || ''}</div>`;

  frame.appendChild(inner);
  modal.appendChild(closeBtn);
  modal.appendChild(hint);
  modal.appendChild(frame);
  document.body.appendChild(modal);

  document.body.style.overflow = 'hidden';
}

function closeReadMode(){
  const modal = document.getElementById('readModal');
  if(modal) modal.remove();
  document.body.style.overflow = '';
}

window.openReadMode = openReadMode;
window.closeReadMode = closeReadMode;

document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight') go(1);
  if(e.key==='ArrowLeft')  go(-1);
});

/* Prevent StPageFlip from interpreting TOC clicks as page turns.
   StPageFlip listens on pointerdown/mousedown, so we must stop
   those events (not click) before they reach its handler. */
['pointerdown','mousedown','touchstart'].forEach(evt=>{
  document.addEventListener(evt, e=>{
    if(e.target.closest('.toc-row.go')){
      e.stopPropagation();
    }
  }, true);
});

/* Mobile touch handling:
   1. Pinch-zoom: when a second finger lands, dispatch synthetic mouseup +
      touchend on window so StPageFlip aborts any in-progress drag. Then
      swallow all subsequent touch events until all fingers lift.
   2. Backward corner tap: the left 25 % of the book triggers go(-1), which
      plays our custom backward-flip animation. */
let pinching = false;
if(isMobile){
  const touches = new Set();
  let firstTouchPos = null;
  let pageIdxBeforeTouch = null;

  function abortStpfDrag(){
    /* Dispatch mouseup at the FIRST touch's position so StPageFlip sees
       zero drag distance and cancels the in-progress flip (rather than
       completing it, which would happen if mouseup arrived far from the
       touch origin). */
    const p = firstTouchPos || {clientX: 0, clientY: 0};
    try {
      window.dispatchEvent(new MouseEvent('mouseup', {
        bubbles: true, cancelable: true,
        clientX: p.clientX, clientY: p.clientY
      }));
    } catch(e){}
    try {
      const ev = new TouchEvent('touchend', {
        bubbles: true, cancelable: true,
        touches: [], targetTouches: [], changedTouches: []
      });
      window.dispatchEvent(ev);
    } catch(e){
      try {
        const ev = new Event('touchend', {bubbles: true, cancelable: true});
        Object.defineProperty(ev, 'touches', {value: []});
        Object.defineProperty(ev, 'targetTouches', {value: []});
        Object.defineProperty(ev, 'changedTouches', {value: []});
        window.dispatchEvent(ev);
      } catch(e2){}
    }
    /* Safety net: if a flip managed to complete before the abort landed,
       snap the book back to the page we were on before the touch. */
    const before = pageIdxBeforeTouch;
    if(before != null){
      setTimeout(() => {
        if(pageFlip.getCurrentPageIndex() !== before){
          _suppressNav = true;
          pageFlip.turnToPage(before);
          _suppressNav = false;
          updateNav();
        }
      }, 80);
    }
  }

  document.addEventListener('touchstart', e => {
    if(touches.size === 0){
      const t = e.changedTouches[0];
      firstTouchPos = {clientX: t.clientX, clientY: t.clientY};
      pageIdxBeforeTouch = pageFlip.getCurrentPageIndex();
    }
    for(const t of e.changedTouches) touches.add(t.identifier);
    if(touches.size >= 2 && !pinching){
      pinching = true;
      abortStpfDrag();
    }
    if(pinching) e.stopImmediatePropagation();
  }, {capture: true});

  document.addEventListener('touchmove', e => {
    if(e.touches.length >= 2 && !pinching){
      pinching = true;
      abortStpfDrag();
    }
    if(pinching) e.stopImmediatePropagation();
  }, {capture: true});

  document.addEventListener('touchend', e => {
    for(const t of e.changedTouches) touches.delete(t.identifier);
    if(pinching){
      e.stopImmediatePropagation();
      if(touches.size === 0) setTimeout(() => { pinching = false; }, 150);
    }
  }, {capture: true});

  document.addEventListener('touchcancel', e => {
    for(const t of e.changedTouches) touches.delete(t.identifier);
    if(touches.size === 0) pinching = false;
  }, {capture: true});

  /* Backward corner tap: intercept touches in the left 25 % of the book so
     StPageFlip does not fire its invisible-spine fold, then trigger our
     custom backward-flip animation on release. A movement threshold keeps
     it from firing on vertical scrolls or accidental drags. */
  let _cornerBackId = null;
  let _cornerStart = null;

  bookEl.addEventListener('pointerdown', e => {
    if(e.pointerType !== 'touch') return;
    if(_animating || pinching) return;
    const rect = bookEl.getBoundingClientRect();
    const x = e.clientX - rect.left;
    if(x < rect.width * 0.25 && pageFlip.getCurrentPageIndex() > 1){
      e.stopImmediatePropagation();
      _cornerBackId = e.pointerId;
      _cornerStart = {x: e.clientX, y: e.clientY};
    }
  }, {capture: true});

  bookEl.addEventListener('touchstart', e => {
    if(_animating || pinching){ e.stopImmediatePropagation(); return; }
    if(_cornerBackId !== null) e.stopImmediatePropagation();
  }, {capture: true});

  document.addEventListener('pointermove', e => {
    if(e.pointerId !== _cornerBackId || !_cornerStart) return;
    const dx = Math.abs(e.clientX - _cornerStart.x);
    const dy = Math.abs(e.clientY - _cornerStart.y);
    if(dx > 20 || dy > 20){
      _cornerBackId = null;
      _cornerStart = null;
    }
  }, {capture: true});

  document.addEventListener('pointerup', e => {
    if(e.pointerId !== _cornerBackId) return;
    _cornerBackId = null;
    _cornerStart = null;
    if(pinching) return;
    go(-1);
  }, {capture: true});

  document.addEventListener('pointercancel', e => {
    if(e.pointerId === _cornerBackId){
      _cornerBackId = null;
      _cornerStart = null;
    }
  }, {capture: true});
}

window.addEventListener('load', () => {
  if (window.location.hash === '#academic-credit') {
    setTimeout(() => {
      goTo(29);
    }, 600);
  }
});
</script>
