<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>NATI-RETI 2026 · Prayer Book</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --navy:#0A1C3E;
  --blue:#1B3B6F;
  --mid:#2E5FA3;
  --gold:#C8A46A;
  --cream:#F5F3EE;
  --off:#FAFAF7;
  --text:#18182E;
  --muted:#4A4A6A;
  --rule:#D8D8E8;
  --PW:640px;
  --PH:730px;
}

html,body{
  width:100%;height:100%;
  background:#F5F5F5;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:18px;overflow:auto;
  font-family:'Lora',Georgia,serif;
}

/* ══════════════════════════════════════════
   BOOK (StPageFlip)
══════════════════════════════════════════ */
.scene{
  width:calc(var(--PW)*2);
  height:var(--PH);
}
#book{
  width:100%;height:100%;
  box-shadow:
    0 2px 8px rgba(0,0,0,.25),
    0 20px 60px rgba(0,0,0,.65),
    0 50px 110px rgba(0,0,0,.45);
}
.stf__block{background:transparent;}
.stf-page{width:100%;height:100%;}

/* ══════════════════════════════════════════
   PAGE BASES
══════════════════════════════════════════ */
.pg{width:var(--PW);height:var(--PH);position:relative;overflow:hidden;font-family:'Lora',serif;}

/* ── COVER (full-bleed artwork) ── */
.pg-art{
  background:#0E2440;
  position:relative;overflow:hidden;
}
.pg-art .art-blur{
  position:absolute;inset:-30px;
  background-size:cover;background-position:center;
  filter:blur(26px) brightness(.82);
}
.pg-art .art-main{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
}
.pg-art .art-main img{
  max-width:100%;max-height:100%;
  object-fit:contain;display:block;
  box-shadow:0 4px 30px rgba(0,0,0,.35);
}

/* ── INSIDE COVER ── */
.pg-inside{
  background:linear-gradient(to right,#040D1A 0%,#0A1C3E 100%);
}

/* ── NAVY TITLE / CELEBRATION COVER ── */
.pg-cover{
  background:linear-gradient(155deg,#1B3B6F 0%,#0A1C3E 100%);
  color:#fff;
  display:flex;flex-direction:column;align-items:center;
  padding:18px 48px 28px;text-align:center;
}
.cover-rule{width:44px;height:2px;background:var(--gold);margin:0 auto 20px;}

/* ── INTERIOR BASE ── */
.pg-int{
  background:var(--off);color:var(--text);
  padding:36px 42px 24px;
  display:flex;flex-direction:column;
}
.pg-int.cream{background:var(--cream);}

.pn{
  font-family:'Inter',sans-serif;font-size:8px;letter-spacing:.14em;
  color:#999;margin-top:auto;padding-top:12px;
  border-top:1px solid var(--rule);
  display:flex;justify-content:space-between;align-items:center;
  flex-shrink:0;
}

/* ── FULL-PHOTO SECTION OPENER ── */
.pg-photo{
  position:relative;overflow:hidden;
  background:#0A1C3E;
}
.photo-fill{position:absolute;inset:0;z-index:0;}
.photo-fill img{
  width:100%;height:100%;
  object-fit:cover;object-position:center;
}
.photo-fill::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(
    to top,
    rgba(8,18,46,.96) 0%,
    rgba(8,18,46,.72) 42%,
    rgba(8,18,46,.28) 100%
  );
}
.photo-credit{
  position:absolute;top:10px;right:12px;
  font-family:'Inter',sans-serif;font-size:6.5px;letter-spacing:.08em;
  color:rgba(255,255,255,.55);z-index:2;text-transform:uppercase;
}
.photo-text{
  position:absolute;bottom:0;left:0;right:0;
  z-index:1;padding:40px 44px 44px;
}
.photo-text .op-label{
  font-family:'Inter',sans-serif;font-size:9px;font-weight:700;
  letter-spacing:.24em;text-transform:uppercase;
  color:var(--gold);margin-bottom:12px;
}
.photo-text .op-rule{width:36px;height:2px;background:var(--gold);margin-bottom:20px;}
.photo-text .op-title{
  font-family:'Playfair Display',serif;font-size:42px;font-weight:700;
  line-height:1.08;color:#fff;margin-bottom:16px;
}
.photo-text .op-desc{
  font-family:'Lora',serif;font-size:12px;line-height:1.74;
  color:rgba(255,255,255,.62);max-width:390px;
}

/* ══════════════════════════════════════════
   INTERIOR TYPOGRAPHY
══════════════════════════════════════════ */
.sl{
  font-family:'Inter',sans-serif;font-size:8.5px;font-weight:600;
  letter-spacing:.22em;text-transform:uppercase;
  color:var(--mid);margin-bottom:8px;flex-shrink:0;
}
.dh{
  font-family:'Playfair Display',serif;
  font-size:22px;font-weight:700;line-height:1.22;
  color:var(--text);margin-bottom:14px;flex-shrink:0;
}
.ra{width:28px;height:2px;background:var(--mid);margin-bottom:12px;flex-shrink:0;}
.bt{
  font-family:'Lora',serif;font-size:11.5px;line-height:1.7;
  color:var(--muted);
}
.bt+.bt{margin-top:9px;}
.lpq{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:17px;line-height:1.52;color:var(--blue);
  padding:18px 0 18px 22px;
  border-left:3px solid var(--gold);
  margin:16px 0;flex-shrink:0;
}
.sub-h{
  font-family:'Inter',sans-serif;font-size:8.5px;font-weight:700;
  letter-spacing:.16em;text-transform:uppercase;color:var(--mid);
  margin-top:10px;margin-bottom:4px;flex-shrink:0;
}

/* TOC */
.toc-row{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:4.5px 0;border-bottom:1px solid var(--rule);
}
.toc-t{font-family:'Lora',serif;font-size:11px;color:var(--muted);}
.toc-t .toc-th{font-style:italic;color:#8a8aa0;}
.toc-t.pillar{font-weight:500;color:var(--blue);font-size:11.5px;}
.toc-p{
  font-family:'Inter',sans-serif;font-size:9px;
  color:#bbb;padding-left:10px;flex-shrink:0;
}
.toc-gap{height:8px;}
.toc-phase{
  font-family:'Inter',sans-serif;font-size:8px;font-weight:700;
  letter-spacing:.2em;text-transform:uppercase;color:var(--gold);
  margin:10px 0 2px;
}
.toc-row.go{cursor:pointer;}
.toc-row.go:hover .toc-t{color:var(--blue);}
.toc-row.go:hover{background:rgba(27,59,111,.05);border-radius:3px;}

/* ══════════════════════════════════════════
   LITURGY SYSTEM
══════════════════════════════════════════ */
.pg-lit{
  background:var(--off);color:var(--text);
  padding:30px 42px 22px;
  display:flex;flex-direction:column;
}
.pg-lit.cream{background:var(--cream);}
.lit-flow{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column;}

/* Day opener block (top of first page of each service) */
.day-kick{
  font-family:'Inter',sans-serif;font-size:8px;font-weight:700;
  letter-spacing:.26em;text-transform:uppercase;
  margin-bottom:7px;flex-shrink:0;
}
.day-title{
  font-family:'Playfair Display',serif;font-size:30px;font-weight:700;
  line-height:1.05;color:var(--text);margin-bottom:5px;flex-shrink:0;
}
.day-sub{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:14.5px;line-height:1.3;margin-bottom:7px;flex-shrink:0;
}
.day-date{
  font-family:'Inter',sans-serif;font-size:8.5px;font-weight:500;
  letter-spacing:.14em;text-transform:uppercase;color:#8a8aa0;
  padding-bottom:10px;margin-bottom:10px;border-bottom:2px solid var(--rule);
  flex-shrink:0;
}

/* Liturgy heading */
.lh{
  font-family:'Inter',sans-serif;font-size:9px;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;
  margin:9px 0 4px;flex-shrink:0;
  display:flex;justify-content:space-between;align-items:baseline;gap:10px;
}
.lh:first-child{margin-top:0;}
.lh .ref{
  font-family:'Lora',serif;font-style:italic;font-weight:400;
  font-size:9.5px;letter-spacing:.02em;text-transform:none;color:#8a8aa0;
  flex-shrink:0;
}
/* Liturgy subhead */
.lsub{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:12px;color:var(--blue);margin:0 0 4px;flex-shrink:0;
}
/* Rubric */
.rub{
  font-family:'Lora',serif;font-style:italic;font-size:9.5px;line-height:1.55;
  color:#8a8aa0;margin:3px 0 5px;padding-left:10px;
  border-left:2px solid var(--gold);flex-shrink:0;
}
/* Body */
.lb{
  font-family:'Lora',serif;font-size:10.5px;line-height:1.62;
  color:var(--muted);margin:3px 0;flex-shrink:0;
}
/* Psalm / poetic block */
.psm{
  font-family:'Lora',serif;font-size:10.5px;line-height:1.62;
  color:var(--muted);margin:3px 0;flex-shrink:0;
}
/* Dialogue row */
.dlg{display:flex;gap:9px;margin:2.5px 0;flex-shrink:0;}
.dlg .who{
  font-family:'Inter',sans-serif;font-size:7.5px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;
  width:56px;flex-shrink:0;padding-top:2.5px;color:var(--mid);
  text-align:right;
}
.dlg .say{
  font-family:'Lora',serif;font-size:10.5px;line-height:1.55;color:var(--muted);
  flex:1;
}
.dlg.all .say{font-weight:600;color:var(--text);}
/* Attribution */
.attr{
  font-family:'Inter',sans-serif;font-size:7.5px;line-height:1.5;
  color:#A8A8B8;letter-spacing:.02em;margin:5px 0 2px;flex-shrink:0;
}
/* Song sheet */
.song{
  flex:1;min-height:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;margin:6px 0;
}
.song img{
  max-width:100%;max-height:100%;object-fit:contain;display:block;
}
.song-cap{
  font-family:'Playfair Display',serif;font-style:italic;font-size:13px;
  color:var(--blue);text-align:center;margin:6px 0 2px;flex-shrink:0;
}
/* Spacer */
.sp{height:6px;flex-shrink:0;}

/* Interlude (placeholder days) */
.pg-interlude{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:54px 56px;
}
.il-kick{
  font-family:'Inter',sans-serif;font-size:8.5px;font-weight:700;
  letter-spacing:.26em;text-transform:uppercase;margin-bottom:16px;
}
.il-title{
  font-family:'Playfair Display',serif;font-size:30px;font-weight:700;
  line-height:1.12;color:var(--text);margin-bottom:8px;
}
.il-sub{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:16px;margin-bottom:18px;
}
.il-rule{width:36px;height:2px;margin:0 auto 18px;}
.il-note{
  font-family:'Lora',serif;font-size:11px;line-height:1.78;
  color:var(--muted);max-width:360px;margin-bottom:22px;
}
.il-tag{
  font-family:'Inter',sans-serif;font-size:8px;font-weight:600;
  letter-spacing:.18em;text-transform:uppercase;
  padding:7px 14px;border-radius:3px;
}

/* Schedule table */
.sched{width:100%;border-collapse:collapse;font-family:'Lora',serif;}
.sched td{
  padding:5px 6px;border-bottom:1px solid var(--rule);
  font-size:9.8px;line-height:1.4;color:var(--muted);vertical-align:top;
}
.sched .sd-day{font-family:'Inter',sans-serif;font-size:8.5px;font-weight:600;color:var(--text);white-space:nowrap;}
.sched .sd-th{font-style:italic;}
.sched-phase td{
  font-family:'Inter',sans-serif;font-size:8px;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;color:var(--gold);
  padding-top:12px;border-bottom:2px solid var(--rule);
}

/* ══════════════════════════════════════════
   NAV BAR · DOTS · READ MODE  (shared)
══════════════════════════════════════════ */
.nav-bar{
  display:flex;align-items:center;gap:18px;
  position:relative;z-index:200;
}
.nb{
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.13);
  color:rgba(255,255,255,.75);
  width:40px;height:40px;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;font-size:14px;
}
.nb:hover:not(:disabled){
  background:rgba(255,255,255,.14);
  border-color:rgba(255,255,255,.26);color:#fff;
}
.nb:disabled{opacity:.2;cursor:default;}
.nb-skip{font-size:16px;opacity:.55;}
.nb-skip:not(:disabled):hover{opacity:1;}
.ni{
  font-family:'Inter',sans-serif;font-size:10px;
  color:rgba(255,255,255,.32);letter-spacing:.08em;
  min-width:74px;text-align:center;
}
.kh{
  font-family:'Inter',sans-serif;font-size:9px;
  color:rgba(255,255,255,.16);letter-spacing:.06em;
}
.nb, .ni { color:#555; border-color:rgba(0,0,0,.15); background:rgba(0,0,0,.04);}
.nb:hover:not(:disabled){background:rgba(0,0,0,.08);border-color:rgba(0,0,0,.3);color:#000;}
.ni{color:#888;}
.kh{color:#aaa;}

/* Desktop: the spread is scaled fluidly by fitScene() in JS so the book,
   nav, dots and bottom buttons always fit the window (13″/15″ laptops). */
@media(max-width:900px){
  .scene{
    width: var(--PW);
    height: var(--PH);
    max-width: none;
    transform: scale(calc(min(92vw, 420px) / 640px));
    transform-origin: top center;
    margin-bottom: calc(var(--PH) * (min(92vw, 420px) / 640px - 1));
  }
  html,body{justify-content:flex-start;padding-top:12px;gap:10px;overflow:auto;}
  .scene,#book,.stf__parent,.stf__wrapper,.stf__block,.stf__item,.stf-page{
    touch-action:pan-y pinch-zoom !important;
  }
  .nav-bar{gap:10px;padding:0 8px;}
  .pillar-dots{gap:7px;padding:0 8px;flex-wrap:wrap;justify-content:center;}
  .pd{width:11px;height:11px;}
  .pd::after{font-size:10px;padding:4px 7px;}
  .kh{display:none;}
}

.pillar-dots{display:flex;gap:10px;align-items:center;justify-content:center;}
.pd{
  width:14px;height:14px;border-radius:50%;
  cursor:pointer;opacity:1;
  transition:opacity .2s,transform .2s,box-shadow .2s;
  box-shadow:0 1px 3px rgba(0,0,0,.25);
  border:1.5px solid rgba(255,255,255,.4);
  flex-shrink:0;
  position:relative;
}
.pd:hover{opacity:1;transform:scale(1.28);}
.pd::after{
  content:attr(data-label);
  position:absolute;
  bottom:calc(100% + 10px);
  left:50%;
  transform:translateX(-50%) translateY(4px);
  background:rgba(10,28,62,.95);
  color:#fff;
  font-family:'Inter',sans-serif;
  font-size:11px;font-weight:500;letter-spacing:.04em;
  padding:6px 10px;border-radius:4px;white-space:nowrap;
  opacity:0;pointer-events:none;
  transition:opacity .18s,transform .18s;
  box-shadow:0 4px 12px rgba(0,0,0,.25);
}
.pd::before{
  content:'';position:absolute;
  bottom:calc(100% + 4px);left:50%;
  transform:translateX(-50%) translateY(4px);
  border:5px solid transparent;
  border-top-color:rgba(10,28,62,.95);
  opacity:0;pointer-events:none;
  transition:opacity .18s,transform .18s;
}
.pd:hover::after,.pd:hover::before{opacity:1;transform:translateX(-50%) translateY(0);}

.nb-zoom{font-size:18px;}
.read-modal{
  position:fixed;inset:0;
  background:rgba(10,28,62,.97);
  z-index:99999;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  overflow:auto;
  -webkit-overflow-scrolling:touch;
  padding:62px 16px 32px;
}
.read-modal-close{
  position:fixed;top:14px;right:14px;
  width:44px;height:44px;border-radius:50%;border:none;
  background:rgba(255,255,255,.22);color:#fff;
  font-size:22px;line-height:1;cursor:pointer;z-index:2;
  font-family:'Inter',sans-serif;
  display:flex;align-items:center;justify-content:center;
}
.read-modal-close:hover{background:rgba(255,255,255,.35);}
.read-modal-hint{
  position:fixed;top:22px;left:50%;
  transform:translateX(-50%);
  color:rgba(255,255,255,.8);
  font-family:'Inter',sans-serif;
  font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;
  pointer-events:none;white-space:nowrap;z-index:1;
}
.read-modal-frame{
  box-shadow:0 12px 50px rgba(0,0,0,.55);
  background:#fff;flex-shrink:0;
}
.read-modal-inner{
  width:var(--PW);height:var(--PH);
  transform-origin:top left;
}

/* ── MOBILE BACKWARD 3D FOLD ── */
.bf3-wrap{
  position:fixed;
  perspective:2200px;
  pointer-events:none;
  z-index:99999;
}
.bf3-flip{
  position:absolute;inset:0;
  transform-origin:left center;
  transform-style:preserve-3d;
  transform:rotateY(-180deg);
  transition-property:transform;
  transition-timing-function:cubic-bezier(.38,0,.22,1);
  will-change:transform;
}
.bf3-face{
  position:absolute;inset:0;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  overflow:hidden;
  box-shadow:0 8px 28px rgba(0,0,0,.38);
  background:#fff;
}
.bf3-back{
  transform:rotateY(180deg);
  background:linear-gradient(to left,#F2F0EA 0%,#E3E1D8 78%,#CFCcc2 100%);
}
.bf3-back::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to right,rgba(0,0,0,.16),rgba(0,0,0,0) 30%);
}
.back-flip-wrap{position:absolute;inset:0;perspective:2000px;pointer-events:none;z-index:50;}
.back-flip-page{
  position:absolute;inset:0;
  transform-origin:right center;
  transform-style:preserve-3d;
  backface-visibility:hidden;
  background:#fff;
  box-shadow:0 6px 22px rgba(0,0,0,.35);
  overflow:hidden;will-change:transform;
}
.back-flip-page.animate{animation:back-flip-rotate 900ms cubic-bezier(.35,0,.25,1) forwards;}
@keyframes back-flip-rotate{from{transform:rotateY(0deg);}to{transform:rotateY(-180deg);}}
.back-flip-page > .stf-page{width:100%;height:100%;}
.back-flip-page .pg{width:100%;height:100%;}
.back-flip-page::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to left,rgba(0,0,0,0),rgba(0,0,0,.35));
  opacity:0;pointer-events:none;
}
.back-flip-page.animate::after{animation:back-flip-shade 900ms cubic-bezier(.35,0,.25,1) forwards;}
@keyframes back-flip-shade{0%{opacity:0;}50%{opacity:.55;}100%{opacity:0;}}

.pdf-download-btn {
  display:inline-flex;align-items:center;
  padding:10px 20px;
  background:var(--navy);color:#fff;
  font-family:'Inter',sans-serif;font-size:11px;font-weight:500;
  text-decoration:none;border-radius:4px;
  border:1px solid rgba(255,255,255,0.1);
  transition:all 0.2s ease;letter-spacing:0.04em;
  z-index:200;box-shadow:0 4px 12px rgba(0,0,0,.15);
}
.pdf-download-btn:hover{
  background:var(--blue);border-color:var(--gold);
  transform:translateY(-1px);box-shadow:0 6px 16px rgba(0,0,0,.2);
}
</style>
</head>
<body>

<div class="scene">
  <div id="book"></div>
</div>

<div class="nav-bar">
  <button class="nb nb-skip" id="btnFirst" onclick="event.stopPropagation();goTo(0)" disabled title="First page">&#171;</button>
  <button class="nb" id="btnP" onclick="go(-1)" disabled>&#8592;</button>
  <div class="ni" id="info">1 / 36</div>
  <button class="nb" id="btnN" onclick="go(1)">&#8594;</button>
  <button class="nb nb-skip" id="btnLast" onclick="event.stopPropagation();goTo(SPREADS.length-1)" title="Last page">&#187;</button>
  <button class="nb nb-zoom" id="btnZoom" onclick="event.stopPropagation();openReadMode()" title="Read fullscreen">&#9906;</button>
</div>
<div class="pillar-dots">
  <div class="pd" data-label="Day 1 · Opening Celebration" onclick="event.stopPropagation();goTo(5)" style="background:#C8A46A;"></div>
  <div class="pd" data-label="Days 2–3 · Climate Justice" onclick="event.stopPropagation();goTo(6)" style="background:#3D993D;"></div>
  <div class="pd" data-label="Day 4 · Secularism &amp; Laicity" onclick="event.stopPropagation();goTo(12)" style="background:#A3A3A3;"></div>
  <div class="pd" data-label="Days 5–6 · Racism &amp; Anti-Racism" onclick="event.stopPropagation();goTo(12)" style="background:#F43506;"></div>
  <div class="pd" data-label="Day 9 · Interfaith Dialogue" onclick="event.stopPropagation();goTo(19)" style="background:#BB35EC;"></div>

function pgD9b(){
  const p = PAL.inter, L = 'Day 9 · Interfaith Dialogue';
  return lit({kick:'Day 9 · Interfaith Dialogue', pal:p, pn:39, label:L},
    LH('Opening Prayer','',p)+
    B('Gathered here in Tkaronto&ndash;Toronto, we raise our hands in gratitude for those whose territory this is. We are grateful, O God, for the welcome that has made this possible &mdash; the welcome of the Haudenosaunee, the Anishinaabe, and the Mississaugas of the Credit, the Chippewa and the Wendat peoples, bound together by the Dish With One Spoon, the ancient covenant these peoples forged through hard-won peace to share this land and keep it whole.')+
    B('In the face of the forces that tug and pull, that push and unsettle, we hear your voice calling us &mdash; not to the erasure of our histories and identities, but to the courage to be so deeply rooted in our history and future with you that we can reach beyond fear toward one another. Most High, deepen our roots and widen our reach.')+
    B('Lead us to trust your Holy Spirit&rsquo;s already-ongoing work in the ones coming toward us, already present in the wisdom we have not yet heard, already at work in healing the wounds we have caused &mdash; wounds still open &mdash; when, instead of listening for you in one another, we have weaponized you against the very ones you love.')+
    B('Receive us and guide us, Holy One &mdash; our questioning and our certainties, our wounds and wounding, our folly and our wisdom, our reaching and our rootedness. Bless us, we pray, that we may be a blessing, in our generation, here for such a time as this. We look to you. We wait for you. Amen.')+

function pgD9d(){

  return lit({kick:'Day 9 · Interfaith Dialogue', pal:p, pn:41, label:L},
    LH('Scripture Reading','Luke 10:25&ndash;37 &middot; First Nations Version',p)+
    B('A scroll keeper, skilled in his knowledge of tribal law, came to Creator Sets Free (Jesus) to test him. &ldquo;Wisdomkeeper,&rdquo; he said, &ldquo;what path must I walk to have the life of the world to come that never fades away, full of beauty and harmony?&rdquo; He answered, &ldquo;What is written in our tribal law? How do you see it?&rdquo; The scroll keeper said, &ldquo;You must love the Great Spirit from deep within, with the strength of your arms, the thoughts of your mind, and the courage of your heart, and you must love your fellow human beings the same way you love yourselves.&rdquo; &ldquo;You have answered well,&rdquo; Creator Sets Free said. &ldquo;If you walk this path you will live.&rdquo;')+
    B('But the scroll keeper, wanting to look good, asked, &ldquo;Who are my fellow human beings?&rdquo; Creator Sets Free answered with a story. &ldquo;A man walking the road from Village of Peace to Moon Village was attacked by thieves, who beat him and left him bleeding. A holy man came down the road and went around him on the other side. Another man, also from the tribe holy men are chosen from, did the same. Then a man from High Place &mdash; not a tribal member, a mixed blood despised by the tribal people &mdash; saw the wounded man and felt pity. He poured good medicine on his wounds, wrapped them, put the man on his own animal, and took him to a lodging house to care for him.&rdquo;')+
    B('Creator Sets Free then asked, &ldquo;Which of these three acted as a fellow human being to the man who was attacked?&rdquo; The scroll keeper answered, &ldquo;The one who had pity on him.&rdquo; &ldquo;Go,&rdquo; Creator Sets Free said, &ldquo;and walk in the same way.&rdquo;')+
    AT('First Nations Version: An Indigenous Translation of the New Testament, IVP, 2021.')
  );
}

function pgD9e(){
  const p = PAL.inter, L = 'Day 9 · Interfaith Dialogue';
  return lit({kick:'Day 9 · Interfaith Dialogue', pal:p, pn:42, label:L},
    LH('Reflection','',p)+
    B('The First Nations Version meets us here and slows us down, making the familiar strange again, and strangely more true. <em>Creator Sets Free. The Great Spirit. Scroll Keeper.</em> These may not be words we grew up with &mdash; or perhaps they are, yet somewhere we were told they were not sacred enough. This translation is itself an act of what we are here to practise: visible justice &mdash; the willingness to hear what we thought we knew spoken in a voice we did not expect, and to find it more true, not less.')+
    B('The answer comes not as doctrine but as embodiment. We are commanded to love with our whole being &mdash; the strength of our arms, the thoughts of our mind, the courage of our heart. The instruction that stands first is not a belief to hold but a life to live.')+
    B('And then the harder question, the one each of us is still living: <em>Who are my fellow human beings?</em> The one who answered with his life was not the holy man, not the one from the right tribe or tradition. It was the one from High Place &mdash; the despised outsider. Three things he did: he saw the wounded man; he stopped what he was doing; he poured medicine on the wounds.')+
    B('We gather from many traditions, many namings of the sacred. Some of us carry wounds from those whose God-talk was a weapon. Some of us have been the ones who did not stop. Most of us have been both. The text asks us only one question &mdash; <em>Who acted as a fellow human being?</em> &mdash; and then: <em>Go. Walk in the same way.</em>')
  );
}

function pgD10d(){
  const p = PAL.indig, L = 'Day 10 · Indigenous Solidarity';
  return lit({kick:'Day 10 · Indigenous Solidarity', pal:p, pn:50, label:L},
    LH('Reflection','',p)+
    SH('The Circle')+
    B('One model of understanding our relationship to everything is a simple symbol used among Native peoples: the circle. The harmony way of living is often referred to symbolically as a circle or a hoop. Among Native Americans, the harmony way is less like a philosophy and more like a whole way of being and doing life &mdash; a way that requires not just belief but actions that align with and participate in the local ecosystem and the whole universe.')+
    B('A circle seems like the natural way to gather together, each person able to see the eyes of everyone else, each hand clasped to the person next to them, each body creating an impenetrable ring of protection. The circle has no beginning and no end, so one can enter at any place or stage.')+
    B('Life is a sacred circle. When we gather in a circle, the praying has already begun. When we gather in a circle, we communicate with each other and with Great Mystery, even without a word being spoken.')+
    AT('Randy Woodley, &ldquo;The Circle,&rdquo; in &ldquo;Becoming Rooted,&rdquo; Broadleaf Books, pp. 63&ndash;64.')+
    LH('Symbolic Act','',p)+
    SH('Mending the Circle')+
    RU('All stand in a circle. One leader lights a small candle from the central Christ candle.')+
    B('In turn around the circle, starting in the East, each person names a place of brokenness in the circle of life, a violation of the harmony way, ending with the words &ldquo;We have forgotten who we are.&rdquo;')+
    DA('All','We have forgotten who we are.')+
    B('Then the person offers a prayer or intention to repair the circle as they light their candle, ending with the words &ldquo;I join with the earth and with all beings.&rdquo;')+
    DA('All','We join with the earth and with each other.')+
    AT('Created by Kara Markell. Responses adapted from the UN Environmental Sabbath / Earth Rest Day, 1990.')
  );
}

function pgD10e(){
  const p = PAL.indig, L = 'Day 10 · Indigenous Solidarity';
  return lit({kick:'Day 10 · Indigenous Solidarity', pal:p, pn:51, label:L},
    LH('Intercessions','',p)+
    B('Creator, whose many names are spoken in many tongues: you made this world in beauty and balance, teaching us to live in harmony with the Earth and in right relationship with all creation. You placed the First Peoples on this land and gave them language, ceremony, kinship, and wisdom.')+
    B('We come before you, recognizing the harm of settlers, colonizers, churches, and governments. We name the truth that Christian empire tried to erase Indigenous cultures; that your church participated in boarding schools, land theft, and forced assimilation. We grieve the trauma that still echoes through generations.')+
    RU('Pause.')+
    B('We repent of our complicity, past and present, things done and things left undone. We pray for the Indigenous peoples of this place &mdash; Anishinaabewaki, Anishinaabe, and Michif &mdash; who have held fast to language, ceremony, and culture. We give thanks for the wisdom they continue to share and for their witness of resilience, healing, and strength.')+
    AT('Adapted from the Episcopal Office of Government Relations, Weekly Prayers, August 2025.')+
    LH('Closing Prayer','',p)+
    B('Creator, teach us to walk with humility. Help us to listen more than we speak, to follow more than we lead, and to repair what has been broken &mdash; not just with words, but with our lives. Teach us to be good relatives, allies in the work of justice, co-labourers in the work of healing, and faithful stewards of the land we all share. We ask this in the name of your child Jesus, who came not to dominate but to liberate. Amen.')+
    AT('The Episcopal Church, Office of Indigenous Ministries, &ldquo;A Disciple&rsquo;s Prayer Book.&rdquo;')+
    LH('The Lord&rsquo;s Prayer','',p)+
    RU('Let us pray together, each in the language of their heart.')
  );
}

/* ============================================================
   SPREADS
============================================================ */
const SPREADS = [
  [pgInsideCover,  pgCover],        // 0
  [pgHalfTitle,    pgTitlePage],    // 1
  [pgCredits,      pgSLWG],         // 2
  [pgTOC,          pgAbout],        // 2
  [pgPrayerLife,   pgUSAPhase],     // 3
  [pgD1a,          pgD1b],          // 4
  [pgD2a,          pgD2b],          // 5
  [pgD2c,          pgD2d],          // 6
  [pgD2e,          pgD2f],          // 7
  [pgD3a,          pgD3b],          // 8
  [pgD3c,          pgD3d],          // 9
  [pgD3e,          pgD3f],          // 10
  [pgD4,           pgD5a],          // 11
  [pgD5b,          pgD5c],          // 12
  [pgD5d,          pgD5e],          // 13
  [pgD5f,          pgD5g],          // 14
  [pgD6a,          pgD6b],          // 15
  [pgD6c,          pgD6d],          // 16
  [pgD6e,          pgCanadaPhase],  // 17
  [pgD9a,          pgD9b],          // 18
  [pgD9c,          pgD9d],          // 19
  [pgD9e,          pgD9f],          // 20
  [pgD9g,          pgD9h],          // 21
  [pgD9i,          pgD10a],         // 22
  [pgD10b,         pgD10c],         // 23
  [pgD10d,         pgD10e],         // 24
  [pgD10f,         pgD12],          // 25
  [pgD13,          pgD14a],         // 26
  [pgD14b,         pgD14c],         // 27
  [pgD14d,         pgD14e],         // 28
  [pgD14f,         pgD14g],         // 29
  [pgD14h,         pgD14i],         // 30
  [pgD14j,         pgD14k],         // 31
  [pgD14l,         pgD14m],         // 32
  [pgD14n,         pgAppendix],     // 33
  [pgBackCover,    pgBlankEnd],     // 34
];

/* ============================================================
   ENGINE — StPageFlip
============================================================ */
const bookEl   = document.getElementById('book');
const btnP     = document.getElementById('btnP');
const btnN     = document.getElementById('btnN');
const btnFirst = document.getElementById('btnFirst');
const btnLast  = document.getElementById('btnLast');
const info     = document.getElementById('info');

const N = SPREADS.length;
const isMobile = window.innerWidth < 900;
/* On mobile the dark inside-cover (first flat page) and dark end page (last)
   are dropped: the book opens directly on the cover artwork. */
const PAGE_OFF = isMobile ? 1 : 0;
const TOTAL = N*2 - (isMobile ? 2 : 0);

function flatPages(){
  const out = [];
  for(let s=0; s<N; s++){
    const [L, R] = SPREADS[s];
    out.push(L(), R());
  }
  return isMobile ? out.slice(1, out.length - 1) : out;
}

const pageHTMLs = flatPages();

function buildPages(){
  return pageHTMLs.map(html => {
    const d = document.createElement('div');
    d.className = 'stf-page';
    d.innerHTML = html;
    return d;
  });
}

const pageFlip = new St.PageFlip(bookEl, {
  width: 640,
  height: 730,
  size: 'fixed',
  minWidth: 320,
  maxWidth: 1280,
  minHeight: 420,
  maxHeight: 1460,
  maxShadowOpacity: 0.5,
  showCover: false,
  usePortrait: isMobile,
  mobileScrollSupport: true,
  drawShadow: true,
  flippingTime: 900,
  useMouseEvents: true,
  swipeDistance: 30
});

pageFlip.loadFromHTML(buildPages());

function currentSpread(){
  return Math.floor((pageFlip.getCurrentPageIndex() + PAGE_OFF) / 2);
}
let _suppressNav = false;
function updateNav(){
  if(_suppressNav) return;
  const s = currentSpread();
  btnP.disabled     = (s<=0);
  btnN.disabled     = (s>=N-1);
  btnFirst.disabled = (s<=0);
  btnLast.disabled  = (s>=N-1);
  info.textContent  = (s+1)+' / '+N;
}
pageFlip.on('flip', function(e) {
  updateNav();
  const sound = document.getElementById('flipSound');
  if (sound) {
    sound.currentTime = 0;
    sound.play().catch(err => console.log('Audio play suppressed:', err));
  }
});
updateNav();

const sceneEl = document.querySelector('.scene');
let _animating = false;

/* Fluid desktop fit: scale the 1280×730 spread so book + nav + dots +
   bottom buttons always fit the window without clipping. */
const CONTROLS_H = 235;
function fitScene(){
  if(isMobile) return;
  const availW = window.innerWidth - 36;
  const availH = Math.max(window.innerHeight - CONTROLS_H, 330);
  const sc = Math.min(1, availW / 1280, availH / 730);
  if(sc < 0.999){
    sceneEl.style.transform = 'scale(' + sc + ')';
    sceneEl.style.transformOrigin = 'top center';
    sceneEl.style.marginBottom = Math.round(730 * (sc - 1)) + 'px';
    document.body.style.justifyContent = 'flex-start';
    document.body.style.paddingTop = '16px';
    document.body.style.gap = '14px';
  } else {
    sceneEl.style.transform = '';
    sceneEl.style.transformOrigin = '';
    sceneEl.style.marginBottom = '';
    document.body.style.justifyContent = '';
    document.body.style.paddingTop = '';
    document.body.style.gap = '';
  }
}
window.addEventListener('resize', fitScene);
fitScene();

/* Symmetric 3D page fold (mobile).
   dir = -1 (backward): the previous leaf swings in from the spine —
     back-of-page first, then its face — covering the current page.
   dir = +1 (forward): the current leaf lifts off and swings away over
     the spine, revealing the next page beneath. */
function playFoldAnim(dir, fromIdx, targetIdx){
  if(_animating) return;
  _animating = true;
  _suppressNav = true;

  const rect = bookEl.getBoundingClientRect();
  const scale = rect.width / 640;
  const duration = 950;

  const faceIdx = dir > 0 ? fromIdx : targetIdx;

  const wrap = document.createElement('div');
  wrap.className = 'bf3-wrap';
  wrap.style.cssText = `left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;height:${rect.height}px;`;

  const flip = document.createElement('div');
  flip.className = 'bf3-flip';
  flip.style.transitionDuration = duration + 'ms';
  flip.style.transform = dir > 0 ? 'rotateY(0deg)' : 'rotateY(-180deg)';

  const front = document.createElement('div');
  front.className = 'bf3-face';
  front.innerHTML = `<div style="width:640px;height:730px;transform-origin:top left;transform:scale(${scale});"><div class="stf-page" style="width:100%;height:100%;">${pageHTMLs[faceIdx] || ''}</div></div>`;

  const back = document.createElement('div');
  back.className = 'bf3-face bf3-back';

  flip.appendChild(front);
  flip.appendChild(back);
  wrap.appendChild(flip);
  document.body.appendChild(wrap);

  if(dir > 0){
    /* the book beneath jumps to the target now, hidden by the overlay */
    pageFlip.turnToPage(targetIdx);
  }

  requestAnimationFrame(() => requestAnimationFrame(() => {
    flip.style.transform = dir > 0 ? 'rotateY(-180deg)' : 'rotateY(0deg)';
  }));

  setTimeout(() => {
    if(dir < 0) pageFlip.turnToPage(targetIdx);
    setTimeout(() => {
      wrap.remove();
      _animating = false;
      _suppressNav = false;
      updateNav();
    }, 70);
  }, duration + 40);
}

function go(dir){
  if(_animating) return;
  if(!isMobile){
    if(dir > 0) pageFlip.flipNext();
    else pageFlip.flipPrev();
    return;
  }
  const cur = pageFlip.getCurrentPageIndex();
  const target = cur + dir;
  if(target < 0 || target > TOTAL - 1) return;
  playFoldAnim(dir, cur, target);
}
function goTo(spreadIdx){
  if(spreadIdx<0 || spreadIdx>=N) return;
  pageFlip.turnToPage(Math.max(0, spreadIdx * 2 - PAGE_OFF));
}
window.go = go;
window.goTo = goTo;

function openReadMode(){
  if(document.getElementById('readModal')) return;
  const idx = pageFlip.getCurrentPageIndex();
  const availW = window.innerWidth - 32;
  const availH = window.innerHeight - 110;
  const scale = Math.min(availW / 640, availH / 730, 1.1);

  const modal = document.createElement('div');
  modal.id = 'readModal';
  modal.className = 'read-modal';

  const closeBtn = document.createElement('button');
  closeBtn.className = 'read-modal-close';
  closeBtn.setAttribute('aria-label', 'Close');
  closeBtn.innerHTML = '&times;';
  closeBtn.onclick = closeReadMode;

  const hint = document.createElement('div');
  hint.className = 'read-modal-hint';
  hint.textContent = 'Pinch to zoom';

  const frame = document.createElement('div');
  frame.className = 'read-modal-frame';
  frame.style.width = (640 * scale) + 'px';
  frame.style.height = (730 * scale) + 'px';

  const inner = document.createElement('div');
  inner.className = 'read-modal-inner';
  inner.style.transform = `scale(${scale})`;
  inner.innerHTML = `<div class="stf-page" style="width:var(--PW);height:var(--PH);">${pageHTMLs[idx] || ''}</div>`;

  frame.appendChild(inner);
  modal.appendChild(closeBtn);
  modal.appendChild(hint);
  modal.appendChild(frame);
  document.body.appendChild(modal);

  document.body.style.overflow = 'hidden';
}

function closeReadMode(){
  const modal = document.getElementById('readModal');
  if(modal) modal.remove();
  document.body.style.overflow = '';
}

window.openReadMode = openReadMode;
window.closeReadMode = closeReadMode;

document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight') go(1);
  if(e.key==='ArrowLeft')  go(-1);
});

['pointerdown','mousedown','touchstart'].forEach(evt=>{
  document.addEventListener(evt, e=>{
    if(e.target.closest('.toc-row.go')){
      e.stopPropagation();
    }
  }, true);
});

let pinching = false;
if(isMobile){
  const touches = new Set();
  let firstTouchPos = null;
  let pageIdxBeforeTouch = null;

  function abortStpfDrag(){
    const p = firstTouchPos || {clientX: 0, clientY: 0};
    try {
      window.dispatchEvent(new MouseEvent('mouseup', {
        bubbles: true, cancelable: true,
        clientX: p.clientX, clientY: p.clientY
      }));
    } catch(e){}
    try {
      const ev = new TouchEvent('touchend', {
        bubbles: true, cancelable: true,
        touches: [], targetTouches: [], changedTouches: []
      });
      window.dispatchEvent(ev);
    } catch(e){
      try {
        const ev = new Event('touchend', {bubbles: true, cancelable: true});
        Object.defineProperty(ev, 'touches', {value: []});
        Object.defineProperty(ev, 'targetTouches', {value: []});
        Object.defineProperty(ev, 'changedTouches', {value: []});
        window.dispatchEvent(ev);
      } catch(e2){}
    }
    const before = pageIdxBeforeTouch;
    if(before != null){
      setTimeout(() => {
        if(pageFlip.getCurrentPageIndex() !== before){
          _suppressNav = true;
          pageFlip.turnToPage(before);
          _suppressNav = false;
          updateNav();
        }
      }, 80);
    }
  }

  document.addEventListener('touchstart', e => {
    if(touches.size === 0){
      const t = e.changedTouches[0];
      firstTouchPos = {clientX: t.clientX, clientY: t.clientY};
      pageIdxBeforeTouch = pageFlip.getCurrentPageIndex();
    }
    for(const t of e.changedTouches) touches.add(t.identifier);
    if(touches.size >= 2 && !pinching){
      pinching = true;
      abortStpfDrag();
    }
    if(pinching) e.stopImmediatePropagation();
  }, {capture: true});

  document.addEventListener('touchmove', e => {
    if(e.touches.length >= 2 && !pinching){
      pinching = true;
      abortStpfDrag();
    }
    if(pinching) e.stopImmediatePropagation();
  }, {capture: true});

  document.addEventListener('touchend', e => {
    for(const t of e.changedTouches) touches.delete(t.identifier);
    if(pinching){
      e.stopImmediatePropagation();
      if(touches.size === 0) setTimeout(() => { pinching = false; }, 150);
    }
  }, {capture: true});

  document.addEventListener('touchcancel', e => {
    for(const t of e.changedTouches) touches.delete(t.identifier);
    if(touches.size === 0) pinching = false;
  }, {capture: true});

  let _cornerBackId = null;
  let _cornerStart = null;

  bookEl.addEventListener('pointerdown', e => {
    if(e.pointerType !== 'touch') return;
    if(_animating || pinching) return;
    const rect = bookEl.getBoundingClientRect();
    const x = e.clientX - rect.left;
    if(x < rect.width * 0.25 && pageFlip.getCurrentPageIndex() > 0){
      e.stopImmediatePropagation();
      _cornerBackId = e.pointerId;
      _cornerStart = {x: e.clientX, y: e.clientY};
    }
  }, {capture: true});

  bookEl.addEventListener('touchstart', e => {
    if(_animating || pinching){ e.stopImmediatePropagation(); return; }
    if(_cornerBackId !== null) e.stopImmediatePropagation();
  }, {capture: true});

  document.addEventListener('pointermove', e => {
    if(e.pointerId !== _cornerBackId || !_cornerStart) return;
    const dx = Math.abs(e.clientX - _cornerStart.x);
    const dy = Math.abs(e.clientY - _cornerStart.y);
    if(dx > 20 || dy > 20){
      _cornerBackId = null;
      _cornerStart = null;
    }
  }, {capture: true});

  document.addEventListener('pointerup', e => {
    if(e.pointerId !== _cornerBackId) return;
    _cornerBackId = null;
    _cornerStart = null;
    if(pinching) return;
    go(-1);
  }, {capture: true});

  document.addEventListener('pointercancel', e => {
    if(e.pointerId === _cornerBackId){
      _cornerBackId = null;
      _cornerStart = null;
    }
  }, {capture: true});
}

</script>
