<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>NATI-RETI 2026 · Prayer Book</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --navy:#0A1C3E;
  --blue:#1B3B6F;
  --mid:#2E5FA3;
  --gold:#C8A46A;
  --cream:#F5F3EE;
  --off:#FAFAF7;
  --text:#18182E;
  --muted:#4A4A6A;
  --rule:#D8D8E8;
  --PW:640px;
  --PH:730px;
}

html,body{
  width:100%;height:100%;
  background:#F5F5F5;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:18px;overflow:auto;
  font-family:'Lora',Georgia,serif;
}

/* ══════════════════════════════════════════
   BOOK (StPageFlip)
══════════════════════════════════════════ */
.scene{
  width:calc(var(--PW)*2);
  height:var(--PH);
}
#book{
  width:100%;height:100%;
  box-shadow:
    0 2px 8px rgba(0,0,0,.25),
    0 20px 60px rgba(0,0,0,.65),
    0 50px 110px rgba(0,0,0,.45);
}
.stf__block{background:transparent;}
.stf-page{width:100%;height:100%;}

/* ══════════════════════════════════════════
   PAGE BASES
══════════════════════════════════════════ */
.pg{width:var(--PW);height:var(--PH);position:relative;overflow:hidden;font-family:'Lora',serif;}

/* ── COVER (full-bleed artwork) ── */
.pg-art{
  background:#0E2440;
  position:relative;overflow:hidden;
}
.pg-art .art-blur{
  position:absolute;inset:-30px;
  background-size:cover;background-position:center;
  filter:blur(26px) brightness(.82);
}
.pg-art .art-main{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
}
.pg-art .art-main img{
  max-width:100%;max-height:100%;
  object-fit:contain;display:block;
  box-shadow:0 4px 30px rgba(0,0,0,.35);
}

/* ── INSIDE COVER ── */
.pg-inside{
  background:linear-gradient(to right,#040D1A 0%,#0A1C3E 100%);
}

/* ── NAVY TITLE / CELEBRATION COVER ── */
.pg-cover{
  background:linear-gradient(155deg,#1B3B6F 0%,#0A1C3E 100%);
  color:#fff;
  display:flex;flex-direction:column;align-items:center;
  padding:18px 48px 28px;text-align:center;
}
.cover-rule{width:44px;height:2px;background:var(--gold);margin:0 auto 20px;}

/* ── INTERIOR BASE ── */
.pg-int{
  background:var(--off);color:var(--text);
  padding:36px 42px 24px;
  display:flex;flex-direction:column;
}
.pg-int.cream{background:var(--cream);}

.pn{
  font-family:'Inter',sans-serif;font-size:8px;letter-spacing:.14em;
  color:#999;margin-top:auto;padding-top:12px;
  border-top:1px solid var(--rule);
  display:flex;justify-content:space-between;align-items:center;
  flex-shrink:0;
}

/* ── FULL-PHOTO SECTION OPENER ── */
.pg-photo{
  position:relative;overflow:hidden;
  background:#0A1C3E;
}
.photo-fill{position:absolute;inset:0;z-index:0;}
.photo-fill img{
  width:100%;height:100%;
  object-fit:cover;object-position:center;
}
.photo-fill::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(
    to top,
    rgba(8,18,46,.96) 0%,
    rgba(8,18,46,.72) 42%,
    rgba(8,18,46,.28) 100%
  );
}
.photo-credit{
  position:absolute;top:10px;right:12px;
  font-family:'Inter',sans-serif;font-size:6.5px;letter-spacing:.08em;
  color:rgba(255,255,255,.55);z-index:2;text-transform:uppercase;
}
.photo-text{
  position:absolute;bottom:0;left:0;right:0;
  z-index:1;padding:40px 44px 44px;
}
.photo-text .op-label{
  font-family:'Inter',sans-serif;font-size:9px;font-weight:700;
  letter-spacing:.24em;text-transform:uppercase;
  color:var(--gold);margin-bottom:12px;
}
.photo-text .op-rule{width:36px;height:2px;background:var(--gold);margin-bottom:20px;}
.photo-text .op-title{
  font-family:'Playfair Display',serif;font-size:42px;font-weight:700;
  line-height:1.08;color:#fff;margin-bottom:16px;
}
.photo-text .op-desc{
  font-family:'Lora',serif;font-size:12px;line-height:1.74;
  color:rgba(255,255,255,.62);max-width:390px;
}

/* ══════════════════════════════════════════
   INTERIOR TYPOGRAPHY
══════════════════════════════════════════ */
.sl{
  font-family:'Inter',sans-serif;font-size:8.5px;font-weight:600;
  letter-spacing:.22em;text-transform:uppercase;
  color:var(--mid);margin-bottom:8px;flex-shrink:0;
}
.dh{
  font-family:'Playfair Display',serif;
  font-size:22px;font-weight:700;line-height:1.22;
  color:var(--text);margin-bottom:14px;flex-shrink:0;
}
.ra{width:28px;height:2px;background:var(--mid);margin-bottom:12px;flex-shrink:0;}
.bt{
  font-family:'Lora',serif;font-size:11.5px;line-height:1.7;
  color:var(--muted);
}
.bt+.bt{margin-top:9px;}
.lpq{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:17px;line-height:1.52;color:var(--blue);
  padding:18px 0 18px 22px;
  border-left:3px solid var(--gold);
  margin:16px 0;flex-shrink:0;
}
.sub-h{
  font-family:'Inter',sans-serif;font-size:8.5px;font-weight:700;
  letter-spacing:.16em;text-transform:uppercase;color:var(--mid);
  margin-top:10px;margin-bottom:4px;flex-shrink:0;
}

/* TOC */
.toc-row{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:4.5px 0;border-bottom:1px solid var(--rule);
}
.toc-t{font-family:'Lora',serif;font-size:11px;color:var(--muted);}
.toc-t .toc-th{font-style:italic;color:#8a8aa0;}
.toc-t.pillar{font-weight:500;color:var(--blue);font-size:11.5px;}
.toc-p{
  font-family:'Inter',sans-serif;font-size:9px;
  color:#bbb;padding-left:10px;flex-shrink:0;
}
.toc-gap{height:8px;}
.toc-phase{
  font-family:'Inter',sans-serif;font-size:8px;font-weight:700;
  letter-spacing:.2em;text-transform:uppercase;color:var(--gold);
  margin:10px 0 2px;
}
.toc-row.go{cursor:pointer;}
.toc-row.go:hover .toc-t{color:var(--blue);}
.toc-row.go:hover{background:rgba(27,59,111,.05);border-radius:3px;}

/* ══════════════════════════════════════════
   LITURGY SYSTEM
══════════════════════════════════════════ */
.pg-lit{
  background:var(--off);color:var(--text);
  padding:30px 42px 22px;
  display:flex;flex-direction:column;
}
.pg-lit.cream{background:var(--cream);}
.lit-flow{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column;}

/* Day opener block (top of first page of each service) */
.day-kick{
  font-family:'Inter',sans-serif;font-size:8px;font-weight:700;
  letter-spacing:.26em;text-transform:uppercase;
  margin-bottom:7px;flex-shrink:0;
}
.day-title{
  font-family:'Playfair Display',serif;font-size:30px;font-weight:700;
  line-height:1.05;color:var(--text);margin-bottom:5px;flex-shrink:0;
}
.day-sub{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:14.5px;line-height:1.3;margin-bottom:7px;flex-shrink:0;
}
.day-date{
  font-family:'Inter',sans-serif;font-size:8.5px;font-weight:500;
  letter-spacing:.14em;text-transform:uppercase;color:#8a8aa0;
  padding-bottom:10px;margin-bottom:10px;border-bottom:2px solid var(--rule);
  flex-shrink:0;
}

/* Liturgy heading */
.lh{
  font-family:'Inter',sans-serif;font-size:9px;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;
  margin:9px 0 4px;flex-shrink:0;
  display:flex;justify-content:space-between;align-items:baseline;gap:10px;
}
.lh:first-child{margin-top:0;}
.lh .ref{
  font-family:'Lora',serif;font-style:italic;font-weight:400;
  font-size:9.5px;letter-spacing:.02em;text-transform:none;color:#8a8aa0;
  flex-shrink:0;
}
/* Liturgy subhead */
.lsub{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:12px;color:var(--blue);margin:0 0 4px;flex-shrink:0;
}
/* Rubric */
.rub{
  font-family:'Lora',serif;font-style:italic;font-size:9.5px;line-height:1.55;
  color:#8a8aa0;margin:3px 0 5px;padding-left:10px;
  border-left:2px solid var(--gold);flex-shrink:0;
}
/* Body */
.lb{
  font-family:'Lora',serif;font-size:10.5px;line-height:1.62;
  color:var(--muted);margin:3px 0;flex-shrink:0;
}
/* Psalm / poetic block */
.psm{
  font-family:'Lora',serif;font-size:10.5px;line-height:1.62;
  color:var(--muted);margin:3px 0;flex-shrink:0;
}
/* Dialogue row */
.dlg{display:flex;gap:9px;margin:2.5px 0;flex-shrink:0;}
.dlg .who{
  font-family:'Inter',sans-serif;font-size:7.5px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;
  width:56px;flex-shrink:0;padding-top:2.5px;color:var(--mid);
  text-align:right;
}
.dlg .say{
  font-family:'Lora',serif;font-size:10.5px;line-height:1.55;color:var(--muted);
  flex:1;
}
.dlg.all .say{font-weight:600;color:var(--text);}
/* Attribution */
.attr{
  font-family:'Inter',sans-serif;font-size:7.5px;line-height:1.5;
  color:#A8A8B8;letter-spacing:.02em;margin:5px 0 2px;flex-shrink:0;
}
/* Song sheet */
.song{
  flex:1;min-height:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;margin:6px 0;
}
.song img{
  max-width:100%;max-height:100%;object-fit:contain;display:block;
}
/* Wide, short scores (refrains, sewing/sending strips, copyright lines):
   render at natural size, centred, so they don't leave a tall empty box. */
.song-strip{
  display:flex;align-items:center;justify-content:center;
  margin:7px 0;flex-shrink:0;
}
.song-strip img{
  max-width:100%;height:auto;max-height:210px;object-fit:contain;display:block;
}
.song-cap{
  font-family:'Playfair Display',serif;font-style:italic;font-size:13px;
  color:var(--blue);text-align:center;margin:6px 0 2px;flex-shrink:0;
}
/* Spacer */
.sp{height:6px;flex-shrink:0;}

/* Interlude (placeholder days) */
.pg-interlude{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:54px 56px;
}
.il-kick{
  font-family:'Inter',sans-serif;font-size:8.5px;font-weight:700;
  letter-spacing:.26em;text-transform:uppercase;margin-bottom:16px;
}
.il-title{
  font-family:'Playfair Display',serif;font-size:30px;font-weight:700;
  line-height:1.12;color:var(--text);margin-bottom:8px;
}
.il-sub{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:16px;margin-bottom:18px;
}
.il-rule{width:36px;height:2px;margin:0 auto 18px;}
.il-note{
  font-family:'Lora',serif;font-size:11px;line-height:1.78;
  color:var(--muted);max-width:360px;margin-bottom:22px;
}
.il-tag{
  font-family:'Inter',sans-serif;font-size:8px;font-weight:600;
  letter-spacing:.18em;text-transform:uppercase;
  padding:7px 14px;border-radius:3px;
}

/* Schedule table */
.sched{width:100%;border-collapse:collapse;font-family:'Lora',serif;}
.sched td{
  padding:5px 6px;border-bottom:1px solid var(--rule);
  font-size:9.8px;line-height:1.4;color:var(--muted);vertical-align:top;
}
.sched .sd-day{font-family:'Inter',sans-serif;font-size:8.5px;font-weight:600;color:var(--text);white-space:nowrap;}
.sched .sd-th{font-style:italic;}
.sched-phase td{
  font-family:'Inter',sans-serif;font-size:8px;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;color:var(--gold);
  padding-top:12px;border-bottom:2px solid var(--rule);
}

/* ══════════════════════════════════════════
   NAV BAR · DOTS · READ MODE  (shared)
══════════════════════════════════════════ */
.nav-bar{
  display:flex;align-items:center;gap:18px;
  position:relative;z-index:200;
}
.nb{
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.13);
  color:rgba(255,255,255,.75);
  width:40px;height:40px;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;font-size:14px;
}
.nb:hover:not(:disabled){
  background:rgba(255,255,255,.14);
  border-color:rgba(255,255,255,.26);color:#fff;
}
.nb:disabled{opacity:.2;cursor:default;}
.nb-skip{font-size:16px;opacity:.55;}
.nb-skip:not(:disabled):hover{opacity:1;}
.ni{
  font-family:'Inter',sans-serif;font-size:10px;
  color:rgba(255,255,255,.32);letter-spacing:.08em;
  min-width:74px;text-align:center;
}
.kh{
  font-family:'Inter',sans-serif;font-size:9px;
  color:rgba(255,255,255,.16);letter-spacing:.06em;
}
.nb, .ni { color:#555; border-color:rgba(0,0,0,.15); background:rgba(0,0,0,.04);}
.nb:hover:not(:disabled){background:rgba(0,0,0,.08);border-color:rgba(0,0,0,.3);color:#000;}
.ni{color:#888;}
.kh{color:#aaa;}

/* Desktop: the spread is scaled fluidly by fitScene() in JS so the book,
   nav, dots and bottom buttons always fit the window (13″/15″ laptops). */
@media(max-width:900px){
  .scene{
    width: var(--PW);
    height: var(--PH);
    max-width: none;
    transform: scale(calc(min(92vw, 420px) / 640px));
    transform-origin: top center;
    margin-bottom: calc(var(--PH) * (min(92vw, 420px) / 640px - 1));
  }
  html,body{justify-content:flex-start;padding-top:12px;gap:10px;overflow:auto;}
  .scene,#book,.stf__parent,.stf__wrapper,.stf__block,.stf__item,.stf-page{
    touch-action:pan-y pinch-zoom !important;
  }
  .nav-bar{gap:10px;padding:0 8px;}
  .pillar-dots{gap:7px;padding:0 8px;flex-wrap:wrap;justify-content:center;}
  .pd{width:11px;height:11px;}
  .pd::after{font-size:10px;padding:4px 7px;}
  .kh{display:none;}
}

.pillar-dots{display:flex;gap:10px;align-items:center;justify-content:center;}
.pd{
  width:14px;height:14px;border-radius:50%;
  cursor:pointer;opacity:1;
  transition:opacity .2s,transform .2s,box-shadow .2s;
  box-shadow:0 1px 3px rgba(0,0,0,.25);
  border:1.5px solid rgba(255,255,255,.4);
  flex-shrink:0;
  position:relative;
}
.pd:hover{opacity:1;transform:scale(1.28);}
.pd::after{
  content:attr(data-label);
  position:absolute;
  bottom:calc(100% + 10px);
  left:50%;
  transform:translateX(-50%) translateY(4px);
  background:rgba(10,28,62,.95);
  color:#fff;
  font-family:'Inter',sans-serif;
  font-size:11px;font-weight:500;letter-spacing:.04em;
  padding:6px 10px;border-radius:4px;white-space:nowrap;
  opacity:0;pointer-events:none;
  transition:opacity .18s,transform .18s;
  box-shadow:0 4px 12px rgba(0,0,0,.25);
}
.pd::before{
  content:'';position:absolute;
  bottom:calc(100% + 4px);left:50%;
  transform:translateX(-50%) translateY(4px);
  border:5px solid transparent;
  border-top-color:rgba(10,28,62,.95);
  opacity:0;pointer-events:none;
  transition:opacity .18s,transform .18s;
}
.pd:hover::after,.pd:hover::before{opacity:1;transform:translateX(-50%) translateY(0);}

.nb-zoom{font-size:18px;}
.read-modal{
  position:fixed;inset:0;
  background:rgba(10,28,62,.97);
  z-index:99999;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  overflow:auto;
  -webkit-overflow-scrolling:touch;
  padding:62px 16px 32px;
}
.read-modal-close{
  position:fixed;top:14px;right:14px;
  width:44px;height:44px;border-radius:50%;border:none;
  background:rgba(255,255,255,.22);color:#fff;
  font-size:22px;line-height:1;cursor:pointer;z-index:2;
  font-family:'Inter',sans-serif;
  display:flex;align-items:center;justify-content:center;
}
.read-modal-close:hover{background:rgba(255,255,255,.35);}
.read-modal-hint{
  position:fixed;top:22px;left:50%;
  transform:translateX(-50%);
  color:rgba(255,255,255,.8);
  font-family:'Inter',sans-serif;
  font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;
  pointer-events:none;white-space:nowrap;z-index:1;
}
.read-modal-frame{
  box-shadow:0 12px 50px rgba(0,0,0,.55);
  background:#fff;flex-shrink:0;
}
.read-modal-inner{
  width:var(--PW);height:var(--PH);
  transform-origin:top left;
}

/* ── MOBILE BACKWARD 3D FOLD ── */
.bf3-wrap{
  position:fixed;
  perspective:2200px;
  pointer-events:none;
  z-index:99999;
}
.bf3-flip{
  position:absolute;inset:0;
  transform-origin:left center;
  transform-style:preserve-3d;
  transform:rotateY(-180deg);
  transition-property:transform;
  transition-timing-function:cubic-bezier(.38,0,.22,1);
  will-change:transform;
}
.bf3-face{
  position:absolute;inset:0;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  overflow:hidden;
  box-shadow:0 8px 28px rgba(0,0,0,.38);
  background:#fff;
}
.bf3-back{
  transform:rotateY(180deg);
  background:linear-gradient(to left,#F2F0EA 0%,#E3E1D8 78%,#CFCcc2 100%);
}
.bf3-back::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to right,rgba(0,0,0,.16),rgba(0,0,0,0) 30%);
}
.back-flip-wrap{position:absolute;inset:0;perspective:2000px;pointer-events:none;z-index:50;}
.back-flip-page{
  position:absolute;inset:0;
  transform-origin:right center;
  transform-style:preserve-3d;
  backface-visibility:hidden;
  background:#fff;
  box-shadow:0 6px 22px rgba(0,0,0,.35);
  overflow:hidden;will-change:transform;
}
.back-flip-page.animate{animation:back-flip-rotate 900ms cubic-bezier(.35,0,.25,1) forwards;}
@keyframes back-flip-rotate{from{transform:rotateY(0deg);}to{transform:rotateY(-180deg);}}
.back-flip-page > .stf-page{width:100%;height:100%;}
.back-flip-page .pg{width:100%;height:100%;}
.back-flip-page::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to left,rgba(0,0,0,0),rgba(0,0,0,.35));
  opacity:0;pointer-events:none;
}
.back-flip-page.animate::after{animation:back-flip-shade 900ms cubic-bezier(.35,0,.25,1) forwards;}
@keyframes back-flip-shade{0%{opacity:0;}50%{opacity:.55;}100%{opacity:0;}}

.pdf-download-btn {
  display:inline-flex;align-items:center;
  padding:10px 20px;
  background:var(--navy);color:#fff;
  font-family:'Inter',sans-serif;font-size:11px;font-weight:500;
  text-decoration:none;border-radius:4px;
  border:1px solid rgba(255,255,255,0.1);
  transition:all 0.2s ease;letter-spacing:0.04em;
  z-index:200;box-shadow:0 4px 12px rgba(0,0,0,.15);
}
.pdf-download-btn:hover{
  background:var(--blue);border-color:var(--gold);
  transform:translateY(-1px);box-shadow:0 6px 16px rgba(0,0,0,.2);
}
</style>
</head>
<body>

<div class="scene">
  <div id="book"></div>
</div>

<div class="nav-bar">
  <button class="nb nb-skip" id="btnFirst" onclick="event.stopPropagation();goTo(0)" disabled title="First page">&#171;</button>
  <button class="nb" id="btnP" onclick="go(-1)" disabled>&#8592;</button>
  <div class="ni" id="info">1 / 43</div>
  <button class="nb" id="btnN" onclick="go(1)">&#8594;</button>
  <button class="nb nb-skip" id="btnLast" onclick="event.stopPropagation();goLast()" title="Last page">&#187;</button>
  <button class="nb nb-zoom" id="btnZoom" onclick="event.stopPropagation();openReadMode()" title="Read fullscreen">&#9906;</button>
</div>
<div class="pillar-dots">

    "text": "We believe that the created world is sacred — a revelation of God’s power and gracious presence filling all things. As partner communions of the National Council of Churches, we lament the shattering of the splendid gifts of this web of life, the ways we ignore our responsibility for the well-being of all life, and the destruction of species and their habitats at a rate never known in human history. We are called to care for God’s good earth in ways that sustain life on the planet, provide for the needs of all humankind, and increase justice. We acknowledge and lament that colonialism and racism have exacerbated the impacts of climate change and environmental injustices on minoritized people, and we recommit ourselves to working in solidarity against these systemic harms."

    "text": "Then Paul stood in front of the Areopagus and said, “Athenians, I see how extremely spiritual you are in every way. For as I went through the city and looked carefully at the objects of your worship, I found among them an altar with the inscription, ‘To an unknown god.’ What therefore you worship as unknown, this I proclaim to you. The God who made the world and everything in it, he who is Lord of heaven and earth, does not live in shrines made by human hands, nor is he served by human hands, as though he needed anything, since he himself gives to all mortals life and breath and all things. From one ancestor he made all peoples to inhabit the whole earth, and he allotted the times of their existence and the boundaries of the places where they would live, so that they would search for God and perhaps fumble about for him and find him—though indeed he is not far from each one of us. For ‘In him we live and move and have our being’; as even some of your own poets have said, ‘For we, too, are his offspring.’"

   {
    "t": "ru",
    "text": "The third section of the Belhar Confession is our reflection for this morning."
   },
   {
    "t": "b",
    "text": "We believe that God has entrusted the church with the message of reconciliation in and through Jesus Christ; that the church is called to be the salt of the earth and the light of the world; that the church is called blessed because it is a peacemaker; that the church is witness both by word and by deed to the new heaven and the new earth in which righteousness dwells (2 Cor. 5:17–21; Matt. 5:13–16; Matt. 5:9; 2 Peter 3:13; Rev. 21–22)."
   },
   {
    "t": "b",
    "text": "We believe that God’s lifegiving Word and Spirit has conquered the powers of sin and death, and therefore also of irreconciliation and hatred, bitterness and enmity; that God’s lifegiving Word and Spirit will enable the church to live in a new obedience which can open new possibilities of life for society and the world (Eph. 4:17–6:23; Rom. 6; Col. 1:9–14; Col. 2:13–19; Col. 3:1–4:6)."
   },
   {
    "t": "b",

   },

    "t": "b",

   {
    "t": "b",
    "text": "“The spirit of the Lord spoke to Isaiah and said “Whom shall I send? And who will go for us?” (Isaiah 6:8) In his earthly ministry with his disciples, Jesus declares that “the harvest is abundant but the labourers are few.” (Matthew 9:37) This, as Jesus observes that in the towns and villages he visited there is much sickness, illness and disease. Do we not see that among us now? The disease of racism, the sickness of gender discrimination, all continuing in the midst of a global pandemic. Today in the life of the Church, we acknowledge the Memorial of St. Aloysius Gonzaga, an Italian Jesuit and patron saint of Roman Catholic youth who lost his life in 1591 while caring for the sick during a plague that broke out in Rome, contracting the disease himself. While it is not my intention to lose my life, we do now find ourselves in the grips of multiple, simultaneous pandemics, and our community in need of healing from various diseases. Might it be that we are being called to work in the vineyard in the midst of a shortage of workers?"
   },
   {
    "t": "b",
    "text": "I do not purport to be able to fix or solve any of these issues, certainly not by myself. However, I pledge to work with you in all the ways you articulated prior. Kate, have you seen the end of the last Star Wars movie or Avengers: Endgame? The lone heroes in the story, in each case, see others come to their aid just when it seems all is lost. They do not fight the battle against the common enemy alone (Emperor Palpatine and Thanos, respectively). I have hope that others will be inspired by our example. We just need to stand up and fight the big, bad monsters until the reinforcements show up. Just like in the MeToo movement, after a brave soul or two come forward, there are others that find their courage to join the fray. “Whom shall I send? And who will go for us?” Let us respond as Isaiah did, while praying that the master of the harvest will send more workers for his harvest, for such a time as this, because there is yet work to be done.”"

  "opener": {
   "title": "Morning Prayer",

  },
  "blocks": [
   {
    "t": "lh",
    "text": "Invocation",
    "ref": ""
   },
   {
    "t": "b",
    "text": "Holy God of all places and all peoples,<br>you call us together as one human family —<br>diverse in tongue and tradition<br>yet bound by a common longing for you."
   },
   {
    "t": "b",
    "text": "Open our eyes to your divine image<br>reflected in all of creation —<br>in faces near and far,<br>in wisdom ancient and new."
   },
   {
    "t": "b",
    "text": "Open our ears and our spirits to the myriad and wondrous ways<br>human beings name and know the sacred:<br>Creator, Elohim, Sophia, Allah, Jesus, Bhagavan, Akal Purakh and so many more…"
   },
   {
    "t": "ru",
    "text": "Pause — please say out loud your name for the sacred in the language of your heart."
   },
   {
    "t": "b",
    "text": "Move us beyond tolerance<br>into genuine encounter —<br>where we embody truth-telling and reconciliation,<br>where hope and healing take root,<br>where justice and peace are the mortar of our shared life"
   },
   {
    "t": "b",
    "text": "We pray in the name of your strong and tender love,<br>Amen."
   },
   {
    "t": "at",
    "text": "Adapted from an Emmanuel College (Toronto) prayer service in response to the Québec Mosque massacre, 2017."
   },
   {
    "t": "lh",
    "text": "Opening Prayer",
    "ref": ""
   },
   {
    "t": "b",
    "text": "Gathered here in Tkaronto–Toronto<br>we raise our hands in gratitude for those whose territory this is.<br>We are grateful, O God, for the welcome that has made this possible —<br>the welcome of the Haudenosaunee, the Anishinaabe, and the Mississaugas of the Credit,<br>the Chippewa and the Wendat peoples,<br>bound together by the Dish With One Spoon —<br>the ancient covenant these your peoples forged through hard-won peace<br>to share this land and keep it whole."
   },
   {
    "t": "b",
    "text": "Their prayers have risen from this ground since time beyond memory.<br>We acknowledge and join in their prayers<br>grateful for their enduring presence and wisdom,<br>and we come calling one another to be accountable<br>O God, to your calling on our lives in this and in all places."
   },
   {
    "t": "b",
    "text": "<strong>In the face of the forces that tug and pull, that push and unsettle,</strong><br>we hear your voice calling us —<br>not to the erasure of our histories and our identities,<br>what we have believed, what we have done, where we have fallen short —<br>but to the courage to be so deeply rooted<br>in our history and future with you<br>that we can reach beyond fear toward one another"
   },
   {
    "t": "b",
    "text": "Most High, deepen our roots and widen our reach.<br>Lead us to trust your Holy Spirit’s already-ongoing work<br>in the ones coming toward us,<br>already present in the wisdom we have not yet heard,<br>already at work in healing the wounds we have caused — wounds still open —<br>when instead of listening for you in one another<br>we have weaponized you against the very ones you love."
   },
   {
    "t": "b",
    "text": "<strong>Receive us and guide us, Holy One —</strong><br>our questioning, our certainties,<br>our wounds and wounding,<br><strong>our folly and our wisdom,</strong><br>our reaching and our rootedness."
   },
   {
    "t": "b",
    "text": "Bless us, we pray, that we may be a blessing —<br><strong>in our generation, here for such a time as this.</strong>"
   },
   {
    "t": "b",
    "text": "<strong>We look to you. We wait for you. Amen.</strong>"
   },
   {
    "t": "at",
    "text": "Maureen J. A. Okundi (May 2026, for NATI-RETI)."
   },
   {
    "t": "lh",
    "text": "Psalmody",
    "ref": "Psalm 139:1–18"
   },
   {
    "t": "ru",
    "text": "Read antiphonally: one group reads the normal type; the other responds in bold."
   },
   {
    "t": "ps",
    "text": "O Lord, you have searched me and known me.<strong> You know when I sit down and when I rise up; you discern my thoughts from far away. </strong>You search out my path and my lying down and are acquainted with all my ways.<strong> Even before a word is on my tongue, O Lord, you know it completely. </strong>You hem me in, behind and before, and lay your hand upon me.<strong> Such knowledge is too wonderful for me; it is so high that I cannot attain it.</strong>"
   },
   {
    "t": "ps",
    "text": "Where can I go from your spirit? Or where can I flee from your presence?<strong> If I ascend to heaven, you are there; if I make my bed in Sheol, you are there. </strong>If I take the wings of the morning and settle at the farthest limits of the sea,<strong> even there your hand shall lead me, and your right hand shall hold me fast. </strong>If I say, “Surely the darkness shall cover me, and night wraps itself around me,”<strong> even the darkness is not dark to you; the night is as bright as the day, for darkness is as light to you.</strong>"
   },
   {
    "t": "ps",
    "text": "For it was you who formed my inward parts; you knit me together in my mother’s womb.<strong> I praise you, for I am fearfully and wonderfully made. Wonderful are your works; that I know very well. </strong>My frame was not hidden from you, when I was being made in secret, intricately woven in the depths of the earth.<strong> Your eyes beheld my unformed substance. In your book were written all the days that were formed for me, when none of them as yet existed.</strong>"
   },
   {
    "t": "ps",
    "text": "How weighty to me are your thoughts, O God! How vast is the sum of them! <strong>I try to count them — they are more than the sand; I come to the end — I am still with you.</strong>"
   },

   {
    "t": "lh",
    "text": "Scripture Reading",
    "ref": "Luke 10:25–37 · First Nations Version"
   },
   {
    "t": "b",
    "text": "A scroll keeper, one who was skilled in his knowledge of tribal law, came to Creator Sets Free (Jesus) to test him and trap him in his words. “Wisdomkeeper,” he said. “What path must I walk to have the life of the world to come that never fades away, full of beauty and harmony?”"
   },
   {
    "t": "b",
    "text": "He answered him, “What is written in our tribal law about this? Tell me, how do you see it?”"
   },
   {
    "t": "b",
    "text": "The scroll keeper spoke from the words of the law, “You must love the Great Spirit from deep within, with the strength of your arms, the thoughts of your mind, and the courage of your heart, and you must love your fellow human beings in the same way you love yourselves.”"
   },
   {
    "t": "b",
    "text": "“You have answered well,” Creator Sets Free (Jesus) said back to him. “If you walk this path you will live.”"
   },
   {
    "t": "b",
    "text": "But the scroll keeper, wanting to look good to others, asked him, “Who are my fellow human beings?”"
   },
   {
    "t": "b",
    "text": "Creator Sets Free (Jesus) answered him with a story. “There was a man walking the road from Village of Peace (Jerusalem) to Moon Village (Jericho). On the way he was attacked by thieves, who beat him, stripped him of his clothes, and left him bleeding to death. Now it happened that a holy man was on the same road, not far behind. When he saw the man, he went around him on the other side of the road. Not far behind him was another man, also from the tribe holy men are chosen from. When he saw the wounded man, he did the same thing as the holy man. Then a man from High Place (Samaria), who was also walking the road, saw the wounded man. Even though he was not a Tribal Member but a mixed blood despised by the tribal people, he felt pity for the man."
   },
   {
    "t": "b",
    "text": "He helped him by pouring good medicine on his wounds and wrapping them in a cloth. He put the man on his own animal and took him to a lodging house to care for him. The next day, when the man of High Place (Samaria) was leaving, he gave from his own money pouch to the keeper of the lodging house. ‘Use this to care for him,’ he said, ‘and when I return, I will give you anything more that is needed.’”"
   },
   {
    "t": "b",
    "text": "Creator Sets Free (Jesus) then looked at the scroll keeper and said, “Which one of these three acted as a fellow human being to the man who was attacked by the thieves?” The scroll keeper answered, “The one who had pity on him.” “Go,” Creator Sets Free (Jesus) said, “and walk in the same way.”"
   },
   {
    "t": "at",
    "text": "First Nations Version: An Indigenous Translation of the New Testament, IVP, 2021."
   },
   {
    "t": "lh",
    "text": "Reflection",
    "ref": ""
   },
   {
    "t": "b",
    "text": "The First Nations Version meets us here and it slows us down, making the familiar strange again, and strangely, more true."
   },
   {
    "t": "b",
    "text": "Creator Sets Free. The Great Spirit. Scroll Keeper. These may not be words we grew up with. Or, perhaps, they are, yet somewhere along the way we may have been told they were not sacred enough. This translation itself is an act of what we are here to practise — visible justice: the willingness to hear what we thought we knew spoken in a voice we did not expect — and to find it more true, not less."
   },
   {
    "t": "b",
    "text": "The scroll keeper asks which instruction stands first. And the answer comes not as doctrine but as embodiment. We are invited, indeed commanded, to love with our whole being — the strength of our arms, the thoughts of our mind, the courage of our heart. The instruction that stands first is not a belief to hold but a life to live."
   },
   {
    "t": "b",
    "text": "And then comes the harder question — the one each of us is still living: Who are my fellow human beings?"
   },
   {
    "t": "b",
    "text": "The one who answered that question with his life was not the holy man. It was not the one from the right tribe or the right tradition. It was the one from High Place — the mixed blood, the despised outsider, the one the tribal people had decided was not quite neighbour enough to deserve the name. Three things he did:<br>He saw the wounded man.<br>He stopped what he was doing.<br>He poured medicine on the wounds."
   },
   {
    "t": "b",
    "text": "We gather here from many traditions, many namings of the sacred.<br>Some of us carry wounds from those whose God-talk was a weapon. Some of us have been the ones who did not stop — confident that our theology was sound even as we passed by someone left for dead, bleeding on the road along which we ourselves were walking.<br>Most of us have been both."
   },
   {
    "t": "b",
    "text": "The text does not ask us to resolve this. It asks us only one question:<br>Who among those who saw the wounded man acted as a fellow human being?<br>And then — Go. Walk in the same way."
   },
   {
    "t": "b",
    "text": "We are gathering daily here.<br>Learning, not arriving.<br>Not having solved the question of the neighbour.<br>But learning to stop.<br>Learning to look and in looking to see.<br>Learning to trust that the Spirit who is already at work wherever we go draws us to encounter the other as a fellow human being:<br>To be seen.<br>To be stopped for.<br>To be engaged with — even when that other names the sacred differently than we do."
   },
   {
    "t": "b",
    "text": "And, perhaps, especially then."
   },
   {
    "t": "b",
    "text": "Having said this, we do not gather here only for ourselves."
   },
   {
    "t": "b",
    "text": "We are leaders.<br>People are learning whether to see<br>by watching whether we see.<br>People are watching how we stop —<br>and learning from us whether to stop and whether stopping is worth it.<br>The medicine we pour — or withhold —<br>teaches those in our spheres of influence, those in our care, what love costs."
   },
   {
    "t": "b",
    "text": "We will go from here not only changed but charged:<br>to hold space in our communities<br>for the discomfort of genuine encounter,<br>to speak from our platforms<br>when the sacred is weaponized against the neighbour,<br>to form in those we lead<br>the courage to look,<br>to stop,<br>to pour medicine on wounds still open."
   },
   {
    "t": "b",
    "text": "We must be so anchored that we can reach — courageously and freely —<br>beyond fear, toward our neighbour."
   },
   {
    "t": "b",
    "text": "And we must be leaders who help others<br>find their anchor<br>and trust their reach."
   },
   {
    "t": "ru",
    "text": "Guiding questions for silent meditation:"
   },
   {
    "t": "ru",
    "text": "Who has been the one from High Place in our story, the one whose wisdom we almost missed because of where they came from, or how they named the sacred?"
   },
   {
    "t": "ru",
    "text": "Who in our community is watching to see whether we stop, and what are they learning from us?"
   },

    "t": "at",
    "text": "Maureen J. A. Okundi (May 2026, for NATI-RETI)."

    "text": "In his letter to the Hebrews, Paul reminds us that hope is as an anchor for the soul, firm and secure. Jesus commands us to love our neighbours as ourselves and to love one another as he has loved us."
   },
   {
    "t": "b",
    "text": "Loving and compassionate God, bless these anchors, in the name of the Creator, Redeemer, and Sustainer. May they be a reminder that we belong to God. May they remind us to trust God’s love to hold us, to keep us steady, and to strengthen us in turn to love our neighbours as ourselves. May we see God’s image in one another and experience the spark of divinity in all people and all expressions of the sacred."

 {
  "n": 10,
  "pal": "indig",
  "kick": "Day 10 · Canada Phase · Toronto",
  "label": "Day 10 · Solidarity with Indigenous Communities",
  "opener": {
   "title": "Morning Prayer",
   "sub": "Solidarity with Indigenous Communities",
   "date": "Wednesday, 12 August 2026 · 08:30 – 09:00"
  },
  "blocks": [
   {
    "t": "lh",
    "text": "Invocation",
    "ref": ""
   },
   {
    "t": "sh",
    "text": "The Sacred Circle"
   },
   {
    "t": "d",
    "who": "One",
    "say": "Today we have gathered, and when we look upon the faces around us, we see that the cycles of life continue. We have been given the duty to live in balance and harmony with each other and all living beings. So now, we bring our minds together as one as we give our greetings and our thanks to each other as People.",
    "bold": false
   },
   {
    "t": "d",
    "who": "All",
    "say": "Now our minds are one.",
    "bold": true
   },
   {
    "t": "at",
    "text": "From the Haudenosaunee Thanksgiving Address, “Braiding Sweetgrass,” Robin Wall Kimmerer."
   },
   {
    "t": "lh",
    "text": "Opening Prayer",
    "ref": ""
   },
   {
    "t": "sh",
    "text": "Prayer to the Four Directions"
   },
   {
    "t": "ru",
    "text": "If possible, this is done in an outdoor space. The community turns to face each direction in turn."
   },
   {
    "t": "b",
    "text": "Facing North: O spirits and angels of the North, where fierce storms come from. Come to us and give us strength and courage. Teach us to be strong like the buffalo who turns and faces the fierce winds and storms head on. Come, spirits and angels of the North."
   },
   {
    "t": "b",
    "text": "Facing East: O spirits and angels of the East, where the sun rises every day. Bring light into our hearts and minds so we may also resurrect every morning, acknowledge new life and creativity and renewed hope every day. Come, spirits and angels of the East."
   },
   {
    "t": "b",
    "text": "Facing South: O spirits and angels of the South, where the sun shines the hottest. Bring warmth into our hearts and friendships and all our relations. Come, spirits and angels of the South."
   },
   {
    "t": "b",
    "text": "Facing West: O spirits and angels of the West, where the sun sets every night. Teach us to be at home in the dark and in the silence of the night, and teach us to let go and to trust as we sink into the unknown and await the sun rising tomorrow. Come, spirits and angels of the West."
   },
   {
    "t": "b",
    "text": "Looking up to Father Sky: Come, spirits and angels from above. Teach us to fly high with the eagle and so seek wisdom and perspective in life. Come, spirits and angels from above."
   },
   {
    "t": "b",
    "text": "Looking down to the Earth: Come, spirits and angels from below, where all plants find their roots in Mother Earth. Teach us to remain grounded and thankful for the Earth, our Mother, and to treat her with respect. Come, spirits and angels from below."
   },
   {
    "t": "b",
    "text": "Crossing hands on the heart: Come, spirits and angels from all six directions, into our hearts. Gather in our hearts and make them full with blood that is red, full of energy and flowing with love, gratitude and generosity. Ah Ho. Amen."
   },
   {
    "t": "at",
    "text": "Seneca elder, Sister José Hobday."
   },
   {
    "t": "lh",
    "text": "Psalmody",
    "ref": "Psalm 78:1–8"
   },
   {
    "t": "sh",
    "text": "An Honour Song of Gathers the People"
   },
   {
    "t": "ru",
    "text": "Normal type read by the leader; bold type read by the congregation."
   },
   {
    "t": "ps",
    "text": "All my relatives, listen closely as I teach you.<br>Turn your ear to hear the sacred instructions of my mouth.<br>I will tell wise stories and mysterious tales of the ancient ways,"
   },
   {
    "t": "ps",
    "text": "<strong>Stories that we have heard before and learned from, stories told by our ancestors.</strong>"
   },
   {
    "t": "ps",
    "text": "We will not hide these stories from our children. We will sing songs of honour about Grandfather and tell the generation to come the stories of his power and the beautiful things he has done."
   },
   {
    "t": "ps",
    "text": "The Great Spirit spoke these instructions to guide the tribes of ‘Wrestles with Creator’ (Israel), the descendants of ‘Heel Grabber’ (Jacob), who was the first to receive these instructions,"
   },
   {
    "t": "ps",
    "text": "<strong>So that the children yet to be born will arise and teach their children for seven generations.</strong>"
   },
   {
    "t": "ps",
    "text": "That way, each generation will come to trust Creator. They will not forget his good deeds and follow all his wise instructions,"
   },
   {
    "t": "ps",
    "text": "<strong>So they will not follow in the footsteps of their ancestors, for they were a stubborn and rebellious generation, a generation that did not make their hearts firm or remain faithful in their spirits to their Maker.</strong>"
   },
   {
    "t": "at",
    "text": "“Psalms and Proverbs,” First Nations Version, InterVarsity Press."
   },
   {
    "t": "lh",
    "text": "Song",
    "ref": ""
   },
   {
    "t": "sh",
    "text": "“Draw the Circle Wide”"
   },
   {
    "t": "song",
    "img": "dimg-17.png",
    "cap": "",
    "attr": "",
    "w": 2067,
    "h": 1286,
    "wide": false
   },
   {
    "t": "ru",
    "text": "Sung in unison. Music and words: Mark Miller / Gordon Light. Voices Together #802 · Worship &amp; Song #3154."
   },
   {
    "t": "lh",
    "text": "Scripture Reading",
    "ref": "Matthew 5:1–11 · First Nations Version"
   },
   {
    "t": "b",
    "text": "When Creator Sets Free (Jesus) saw this great crowd, he went back up into the mountainside and sat down to teach the people. His followers came to him there, so he took a deep breath, opened his mouth, and began to share his wisdom with them and teach them how to see Creator’s good road."
   },
   {
    "t": "b",
    "text": "“Creator’s blessing rests on the poor, the ones with broken spirits. The good road from above is theirs to walk."
   },
   {
    "t": "b",
    "text": "“Creator’s blessing rests on the ones who walk a trail of tears, for he will wipe the tears from their eyes and comfort them."
   },
   {
    "t": "b",
    "text": "“Creator’s blessing rests on the ones who walk softly and in a humble manner. The earth, land, and sky will welcome them and always be their home."
   },
   {
    "t": "b",
    "text": "“Creator’s blessing rests on the ones who hunger and thirst for wrongs to be made right again. They will eat and drink until they are full."
   },
   {
    "t": "b",
    "text": "“Creator’s blessing rests on the ones who are merciful and kind to others. Their kindness will find its way back to them — full circle."
   },
   {
    "t": "b",
    "text": "“Creator’s blessing rests on the pure of heart. They are the ones who will see the Great Spirit."
   },
   {
    "t": "b",
    "text": "“Creator’s blessing rests on the ones who make peace. It will be said of them, ‘They are the children of the Great Spirit!’"
   },
   {
    "t": "b",
    "text": "“Creator’s blessing rests on the ones who are hunted down and mistreated for doing what is right, for they are walking the good road from above."
   },
   {
    "t": "b",
    "text": "“Others will lie about you, speak against you, and look down on you with scorn and contempt, all because you walk the road with me. This is a sign that Creator’s blessing is resting on you."
   },
   {
    "t": "b",
    "text": "So let your hearts be glad and jump for joy, for you will be honoured in the spirit-world above. You are like the prophets of old, who were treated in the same way by your ancestors."
   },
   {
    "t": "at",
    "text": "First Nations Version of the New Testament, Terry Wildman, IVP, 2021."
   },
   {
    "t": "lh",
    "text": "Reflection",
    "ref": ""
   },
   {
    "t": "sh",
    "text": "The Circle"
   },
   {
    "t": "b",
    "text": "One model of understanding our relationship to everything is a simple symbol used among Native Americans: the circle. The harmony way of living is often referred to symbolically as a circle or a hoop. Among Native Americans, the harmony way is less like a philosophy and more like a whole way of being and doing life."
   },
   {
    "t": "b",
    "text": "The harmony way is a way of living and being, with very tangible expressions. Living out the harmony way requires not just a belief but also actions that align with and participate in the local ecosystem and the whole universe. The circle is the tangible symbol that represents this understanding."
   },
   {
    "t": "b",
    "text": "A circle seems like the natural way to gather together, each person able to see the eyes of everyone else. Each hand clasped to the person next to themselves. Each body, creating an impenetrable ring of protection. A circle is a very natural and comfortable way to come together."
   },
   {
    "t": "b",
    "text": "The circle has no beginning and no end, so one can enter at any place or stage. The circle can explain stages of life, values, and different people groups. Circles can explain the seasons, how they all continue on to create harmony and balance."
   },
   {
    "t": "b",
    "text": "Life is a sacred circle. When we gather in a circle, the praying has already begun. When we gather in a circle, we communicate with each other and with Great Mystery, even without a word being spoken."
   },
   {
    "t": "at",
    "text": "Randy Woodley, “The Circle,” in “Becoming Rooted,” Broadleaf Books, pp. 63–64."
   },
   {
    "t": "lh",
    "text": "Symbolic Act",
    "ref": ""
   },
   {
    "t": "sh",
    "text": "Mending the Circle"
   },
   {
    "t": "ru",
    "text": "All stand in a circle facing one another. Each person has a small candle. The leader lights their small candle from the central Christ candle."
   },
   {
    "t": "b",
    "text": "In turn around the circle, starting in the East, each person names a place of brokenness in the circle of life, a violation of the harmony way, and ends with the words “We have forgotten who we are.”"
   },
   {
    "t": "d",
    "who": "All",
    "say": "We have forgotten who we are.",
    "bold": true
   },
   {
    "t": "b",
    "text": "Then the same person offers a prayer or intention of repairing the circle as they light their candle. They end with the words “I join with the earth and with all beings.”"
   },
   {
    "t": "d",
    "who": "All",
    "say": "We join with the earth and with each other.",
    "bold": true
   },
   {
    "t": "ru",
    "text": "Proceed around the circle until all candles are lit."
   },
   {
    "t": "at",
    "text": "Created by Kara Markell. Responses adapted from the UN Environmental Sabbath / Earth Rest Day, 1990."
   },
   {
    "t": "lh",
    "text": "Intercessions",
    "ref": ""
   },
   {
    "t": "b",
    "text": "Creator, whose many names are spoken in many tongues: you made this world in beauty and balance, teaching us to live in harmony with the Earth and in right relationship with all creation. You placed the First Peoples on this land and gave them language, ceremony, kinship, and wisdom."
   },
   {
    "t": "b",
    "text": "We come before you, recognizing the harm of settlers, colonizers, churches, and governments. We name the truth that Christian empire tried to erase Indigenous cultures; that your church participated in boarding schools, land theft, and forced assimilation."
   },
   {
    "t": "b",
    "text": "We grieve the trauma that still echoes through generations."
   },
   {
    "t": "ru",
    "text": "Pause."
   },
   {
    "t": "b",
    "text": "We repent of our complicity, past and present; things done and things left undone."
   },
   {
    "t": "ru",
    "text": "Pause."
   },
   {
    "t": "b",
    "text": "We pray for the Indigenous people of this place — Anishinaabewaki, Anishinaabe, and Michif — who have held fast to language, ceremony, and culture. We give thanks for the wisdom they continue to share and for their ongoing witness of resilience, healing, and strength."
   },
   {
    "t": "at",
    "text": "Adapted from the Episcopal Office of Government Relations, Weekly Prayers, August 2025."
   },
   {
    "t": "lh",
    "text": "Closing Prayer",
    "ref": ""
   },
   {
    "t": "b",
    "text": "Creator, teach us to walk with humility. Help us to listen more than we speak, to follow more than we lead, and to repair what has been broken — not just with words, but with our lives. Teach us to be good relatives, allies in the work of justice, co-labourers in the work of healing, and faithful stewards of the land we all share. We ask this in the name of your child Jesus, who came not to dominate but to liberate. Amen."
   },
   {
    "t": "at",
    "text": "The Episcopal Church, Office of Indigenous Ministries, “A Disciple’s Prayer Book.”"
   },
   {
    "t": "lh",
    "text": "The Lord’s Prayer",
    "ref": ""
   },
   {
    "t": "ru",
    "text": "Let us pray together, each in the language of their heart."
   },
   {
    "t": "lh",
    "text": "Benediction",
    "ref": ""
   },
   {

    "text": "Chinook Blessing"
   },
   {

    "say": "We call upon the earth, our planet home, with its beautiful depths and soaring heights, its vitality and abundance of life, and together we ask that it",

   {
    "t": "d",

    "say": "We call upon the mountains, the Cascades and the Olympics, the high green valleys and meadows filled with wild flowers, the snows that never melt, the summits of intense silence, and we ask that they",

   },
   {

    "who": "All",
    "say": "Teach us, and show us the Way.",

   },
   {
    "t": "d",
    "who": "One",
    "say": "We call upon the land which grows our food, the nurturing soil, the fertile fields, the abundant gardens and orchards, and we ask that they",

   },
   {

   {

    "say": "We call upon the creatures of the fields and forests and the seas, our brothers and sisters the wolves and deer, the eagle and dove, the great whales and dolphin, the beautiful Orca and salmon who share our Northwest home, and we ask them to",

 {
  "n": 12,
  "pal": "wealth",
  "kick": "Day 12 · Canada Phase · Toronto",
  "label": "Day 12 · Wealth Disparity and Poverty",
  "opener": {
   "title": "Morning Prayer",
   "sub": "Wealth Disparity and Poverty",
   "date": "Friday, 14 August 2026 · 08:30 – 09:00"
  },
  "blocks": [
   {
    "t": "lh",
    "text": "Invocation",
    "ref": ""
   },
   {
    "t": "b",
    "text": "We gather on the traditional territory of the Haudenosaunee, the Anishinaabe, and the Mississaugas of the Credit, the Chippewa and the Wendat — peoples whose relationship with this land was disrupted by the very systems we name together this morning."
   },
   {
    "t": "b",
    "text": "We come from many nations, many churches, many economic realities.<br>Some of us know poverty from the inside.<br>Some of us carry wealth we did not earn.<br>Some of us carry wealth we have earned — and are still learning what that earning cost.<br>Most of us carry all three, in ways we have not yet fully reckoned with."
   },
   {
    "t": "d",
    "who": "One",
    "say": "Yet we are here — inside the contradiction we have come here to name.",
    "bold": false
   },
   {
    "t": "d",
    "who": "All",
    "say": "Have mercy on us, and make us useful.",
    "bold": true
   },
   {
    "t": "d",
    "who": "One",
    "say": "The One who made heaven and earth keeps faith with the oppressed forever.",
    "bold": false
   },
   {
    "t": "d",
    "who": "All",
    "say": "We come to worship — and to be made accountable.",
    "bold": true
   },
   {
    "t": "d",
    "who": "One",
    "say": "The One who calls the whole church to Jubilee calls us here, now.",
    "bold": false
   },
   {
    "t": "d",
    "who": "All",
    "say": "We come to listen — and to be moved.",
    "bold": true
   },
   {
    "t": "d",
    "who": "One",
    "say": "We open this space as a place of honest reckoning and honest hope.",
    "bold": false
   },
   {
    "t": "d",
    "who": "All",
    "say": "Thanks be to God. Amen.",
    "bold": true
   },
   {
    "t": "at",
    "text": "Maureen J. A. Okundi (2026, for NATI-RETI). The responsive exchange draws on the Jubilee tradition (Leviticus 25; Luke 4:16–21)."
   },
   {
    "t": "lh",
    "text": "Opening Prayer",
    "ref": ""
   },
   {
    "t": "b",
    "text": "O God of all Creation —<br>We gather this morning as Your people,<br>Summoned not by our comfort but by Your call."
   },
   {
    "t": "b",
    "text": "We confess that as your church we have too often blessed the wealthy<br>And counselled patience to the poor.<br>We confess that “charity” has served as substitute for justice,<br>That we have more readily opened our hearts to generosity<br>Than our minds to the structural changes that generosity alone cannot accomplish."
   },
   {
    "t": "b",
    "text": "We confess that we have inherited and maintained economies that impoverish some so that others may accumulate without limit — and that we have neither been honest nor accountable concerning the cost."
   },
   {
    "t": "b",
    "text": "Renew in us today Your vision of the common good —<br>Where enough is available to all because no one is permitted to accumulate at another’s expense,<br>Where Jubilee is not a metaphor but a mandate,<br>Where the earth’s abundance is held in trust for all its peoples,<br>Where the table we set for one another is as wide as Your love."
   },
   {
    "t": "b",
    "text": "We make this prayer in Your many names,<br>Trusting that You are already at work —<br>Here, among us, in the very act of gathering us.<br>Thank You that You have not left us to ourselves.<br>Amen."
   },
   {
    "t": "at",
    "text": "Maureen J. A. Okundi (2026, for NATI-RETI). The address “O God of all Creation” is taken from the first line of the national anthem of Kenya."
   },
   {
    "t": "lh",
    "text": "Psalmody",
    "ref": "Psalms 82 &amp; 146"
   },
   {
    "t": "sh",
    "text": "A composite arrangement of Psalm 82 and Psalm 146"
   },
   {
    "t": "ru",
    "text": "Read responsively."
   },
   {
    "t": "d",
    "who": "One",
    "say": "God has taken their place in the divine council; in the midst of the gods God holds judgment:",
    "bold": false
   },
   {
    "t": "d",
    "who": "All",
    "say": "“How long will you judge unjustly and show partiality to the wicked?”",
    "bold": true
   },
   {

   {
    "t": "b",
    "text": "The text Jesus read was not a new text. It had been read in that synagogue before. The Jubilee passages of Isaiah and Leviticus were ancient by the time He stood up. What was new was not the word. It was His claim of its fulfillment in the present time. Not eventually. Not in the world to come. Not once the political situation permits. Today."
   },
   {
    "t": "b",
    "text": "The Year of Jubilee — God’s people’s radical economic reset — was not sentiment. It addressed systems and structures of oppression, calling for the cancellation of debt, the restoration of land to its forebears, the freeing of enslaved persons, the undoing of the accumulations of exploitation so the community — creditor and debtor, slave and free, everyone — could begin again from a place of sufficiency for all. Jubilee was instituted not as charity but as law."
   },
   {
    "t": "b",
    "text": "We live in cities where the distance between the wealthiest and the most impoverished is measured not in miles but in the length of one person’s arm to another’s. We live in churches that sponsor food banks with one hand and hold investments in extractive industries with the other."
   },
   {
    "t": "b",
    "text": "Jesus did not say, the systems that crush the poor will one day be reformed. He said: Today. This scripture — with all its structural, economic, political weight — is fulfilled now."

    "text": "Here in Queen’s Park, we are at the heart of a city where there is much power and wealth, but also much poverty and suffering. Power and wealth are found in the government buildings to the south and with the University of Toronto that surrounds the park. Distress and lack of power are found close by as well: there are often tents set up in this and neighbouring parks, there are hospitals and soup kitchens nearby. Below us is the subway, which has become one of the safest places for people who are homeless to sleep. Overshadowing all of this is often an aura of indifference, as people are caught up in their own lives, frequently distracted and often overwhelmed."

/* Liturgy element builders */
function LH(t, ref, pal){
  return `<div class="lh" style="color:${pal.c};">${t}${ref?`<span class="ref">${ref}</span>`:''}</div>`;
}
function SH(t){ return `<div class="lsub">${t}</div>`; }
function RU(t){ return `<div class="rub">${t}</div>`; }
function B(t){ return `<div class="lb">${t}</div>`; }
function PS(t){ return `<div class="psm">${t}</div>`; }
function D(who, say, pal){
  return `<div class="dlg"><div class="who" style="color:${pal.c};">${who}</div><div class="say">${say}</div></div>`;
}
function DA(who, say){
  return `<div class="dlg all"><div class="who">${who}</div><div class="say">${say}</div></div>`;
}
function AT(t){ return `<div class="attr">${t}</div>`; }
function SCAP(t){ return `<div class="song-cap">${t}</div>`; }

/* A single liturgy block (from DAYS) -> HTML. Each non-song block is exactly
   ONE top-level element, which the paginator relies on for measure/remove. */
function renderBlock(b, pal){
  switch(b.t){
    case 'lh':   return LH(b.text, b.ref, pal);
    case 'sh':   return SH(b.text);
    case 'ru':   return RU(b.text);
    case 'b':    return B(b.text);
    case 'ps':   return PS(b.text);
    case 'at':   return AT(b.text);
    case 'd':    return b.bold ? DA(b.who, b.say) : D(b.who, b.say, pal);
    case 'song': return `<div class="${b.wide ? 'song-strip' : 'song'}"><img src="${IMG}${b.img}" alt=""></div>`
                        + (b.cap ? SCAP(b.cap) : '')
                        + (b.attr ? AT(b.attr) : '');
    default:     return '';
  }
}

/* ============================================================
   AUTO-PAGINATOR
   Fills 640×730 liturgy pages to capacity from the DAYS data,
   measuring real rendered height so nothing clips and pages are
   densely filled rather than spread thin. Must run after
   document.fonts.ready (see part4.js) so text measures correctly.
============================================================ */

/* Hidden, real-sized host used only for measuring page fill. */
let _measureHost = null;
function measureHost(){
  if(!_measureHost){
    _measureHost = document.createElement('div');
    _measureHost.setAttribute('aria-hidden','true');
    _measureHost.style.cssText = 'position:absolute;left:-10000px;top:0;width:640px;height:730px;';
    document.body.appendChild(_measureHost);
  }
  return _measureHost;
}

const SONG_MIN_SPACE = 300;   // a song wants at least this much vertical room
const FIT_TOL = 1;            // px tolerance for "still fits"

/* Paginate one day's blocks into an array of page-HTML strings. */
function paginateDay(day){
  const pal = PAL[day.pal] || PAL.navy;
  const host = measureHost();
  const pages = [];
  let cur, flow, count, songPage;

  function open(withOpener){
    cur = litShellEl(day, pal, withOpener);
    host.innerHTML = '';
    host.appendChild(cur);
    flow = cur.querySelector('.lit-flow');
    count = 0;
    songPage = false;
  }
  function close(){ pages.push(cur.outerHTML); }
  /* Used height via geometry: scrollHeight pins to clientHeight inside a flex
     column until real overflow, so it can't measure free space. The bottom of
     the last child relative to the flow's top gives the true used height
     (layout position is unaffected by overflow:hidden). */
  function used(){
    if(!flow.lastElementChild) return 0;
    return flow.lastElementChild.getBoundingClientRect().bottom - flow.getBoundingClientRect().top;
  }
  function fits(){ return used() <= flow.clientHeight + FIT_TOL; }
  function room(){ return flow.clientHeight - used(); }
  function isHeading(el){ return el && /(^|\s)(lh|lsub)(\s|$)/.test(el.className); }

  open(true);

  for(let i=0; i<day.blocks.length; i++){
    const b = day.blocks[i];
    const html = renderBlock(b, pal);

    if(b.t === 'song' && !b.wide){
      // a full-page score wants generous room; if the current page is too full,
      // break — but carry any trailing heading down so it isn't orphaned.
      if(count > 0 && room() < SONG_MIN_SPACE){
        const carry = [];
        while(count > 0 && isHeading(flow.lastElementChild)){
          carry.unshift(flow.lastElementChild.outerHTML);
          flow.removeChild(flow.lastElementChild); count--;
        }
        if(count === 0){
          // nothing but heading(s) here — keep them with the song, don't break
          for(const c of carry){ flow.insertAdjacentHTML('beforeend', c); count++; }
        } else {
          close(); open(false);
          for(const c of carry){ flow.insertAdjacentHTML('beforeend', c); count++; }
        }
      }
      flow.insertAdjacentHTML('beforeend', html);
      count++; songPage = true;
      continue;
    }
    if(b.t === 'song' && b.wide){
      // a wide/short strip score flows inline; only break if it doesn't fit
      // (save/restore innerHTML because a song renders several elements).
      const before = flow.innerHTML;
      flow.insertAdjacentHTML('beforeend', html);
      if(!fits() && count > 0){
        flow.innerHTML = before;
        close(); open(false);
        flow.insertAdjacentHTML('beforeend', html);
      }
      count++;
      continue;
    }

    // a new section heading after a full-page score starts a fresh page
    if(songPage && b.t === 'lh' && count > 0){ close(); open(false); }

    flow.insertAdjacentHTML('beforeend', html);
    count++;

    if(!fits() && count > 1){
      // this block overflowed — pull it (and any heading it would orphan)
      // onto a fresh page.
      const overflow = flow.lastElementChild;
      flow.removeChild(overflow);
      count--;
      const carry = [];
      while(count > 1 && isHeading(flow.lastElementChild)){
        carry.unshift(flow.lastElementChild.outerHTML);
        flow.removeChild(flow.lastElementChild);
        count--;
      }
      close();
      open(false);
      for(const c of carry){ flow.insertAdjacentHTML('beforeend', c); count++; }
      flow.insertAdjacentHTML('beforeend', html); count++;
      // if a single block is taller than a whole page it simply stays (rare);
    }
  }
  close();
  return pages;
}

/* Build the full flat page list + day navigation map.
   Returns { pages:[html...], nav:{dayN: flatIndex}, appendixFlat }. */
function buildLayout(){
  const dayPages = {};
  DAYS.forEach(d => { dayPages[d.n] = paginateDay(d); });

  const seq = [];
  seq.push(pgInsideCover(), pgCover(), pgHalfTitle(), pgTitlePage(), pgCredits(), pgSLWG());
  const tocIndex = seq.length; seq.push('__TOC__');
  seq.push(pgAbout(), pgPrayerLife(), pgUSAPhase());   // front matter = 10 pages (0–9)

  const nav = {};
  const appendDay = n => { nav[n] = seq.length; dayPages[n].forEach(h => seq.push(h)); };

  [1,2,3,4,5,6].forEach(appendDay);
  seq.push(pgCanadaPhase());
  [9,10,12,13,14].forEach(appendDay);

  const appendixFlat = seq.length;
  seq.push(pgAppendix());

  // back matter; pad to an even page count for clean spreads
  if((seq.length + 2) % 2 !== 0){ seq.push(pgBlankInterior()); }
  seq.push(pgBackCover(), pgBlankEnd());
  if(seq.length % 2 !== 0){ seq.splice(seq.length - 2, 0, pgBlankInterior()); }

  seq[tocIndex] = pgTOC(nav, appendixFlat);

  // measuring host no longer needed
  if(_measureHost){ _measureHost.remove(); _measureHost = null; }

  return { pages: seq, nav, appendixFlat };
}

/* Pillar navigation dots, built from the runtime nav map. */
function buildDots(nav){
  const sp = f => Math.floor(f/2);
  const dots = [
    ['Day 1 · Opening Celebration',            nav[1],  '#C8A46A', ''],
    ['Days 2–3 · Climate Justice',             nav[2],  '#3D993D', ''],
    ['Day 4 · Secularism &amp; Laicity',       nav[4],  '#A3A3A3', ''],
    ['Days 5–6 · Racism &amp; Anti-Racism',    nav[5],  '#F43506', ''],
    ['Day 9 · Interfaith Dialogue',            nav[9],  '#BB35EC', ''],
    ['Day 10 · Indigenous Solidarity',         nav[10], '#D35400', ''],
    ['Days 12–13 · Wealth Disparity &amp; Poverty', nav[12], '#1F3F66', ''],
    ['Day 14 · Closing Celebration',           nav[14], '#0A1C3E', 'border-color:#C8A46A;'],
  ];
  const host = document.querySelector('.pillar-dots');
  if(!host) return;
  host.innerHTML = dots.map(([label, flat, bg, extra]) =>
    `<div class="pd" data-label="${label}" onclick="event.stopPropagation();goTo(${sp(flat)})" style="background:${bg};${extra}"></div>`
  ).join('');
}
/* ============================================================
   ENGINE — StPageFlip (data-driven, auto-paginated)
   Wrapped in document.fonts.ready so the paginator measures real
   text metrics; otherwise page fill would be computed against
   fallback fonts and pages could clip or under-fill.
============================================================ */

/* Stamp the printed page number (= true flat index) into the last <span>
   of each page's .pn footer. Pages without a .pn are left untouched. */
function stampPageNumber(html, idx){
  const t = document.createElement('div');
  t.innerHTML = html;
  const pn = t.querySelector('.pn');
  if(pn){
    const spans = pn.querySelectorAll('span');
    if(spans.length) spans[spans.length - 1].textContent = idx;
  }
  return t.innerHTML;
}

document.fonts.ready.then(function(){
  const bookEl   = document.getElementById('book');
  const btnP     = document.getElementById('btnP');
  const btnN     = document.getElementById('btnN');
  const btnFirst = document.getElementById('btnFirst');
  const btnLast  = document.getElementById('btnLast');
  const info     = document.getElementById('info');

  /* Build the paginated layout, then bake page numbers in. */
  const layout = buildLayout();
  buildDots(layout.nav);

  const isMobile = window.innerWidth < 900;
  const PAGE_OFF = isMobile ? 1 : 0;

  const pageHTMLs = (function(){
    const numbered = layout.pages.map((html, idx) => stampPageNumber(html, idx));
    return isMobile ? numbered.slice(1, numbered.length - 1) : numbered;
  })();

  const N = layout.pages.length / 2;          // spreads
  const TOTAL = pageHTMLs.length;             // flat pages actually loaded
  window.NSPREADS = N;

  function buildPages(){
    return pageHTMLs.map(html => {
      const d = document.createElement('div');
      d.className = 'stf-page';
      d.innerHTML = html;
      return d;
    });
  }

  const pageFlip = new St.PageFlip(bookEl, {
    width: 640, height: 730, size: 'fixed',
    minWidth: 320, maxWidth: 1280, minHeight: 420, maxHeight: 1460,
    maxShadowOpacity: 0.5, showCover: false,
    usePortrait: isMobile, mobileScrollSupport: true,
    drawShadow: true, flippingTime: 900, useMouseEvents: true, swipeDistance: 30
  });
  pageFlip.loadFromHTML(buildPages());

  function currentSpread(){
    return Math.floor((pageFlip.getCurrentPageIndex() + PAGE_OFF) / 2);
  }
  let _suppressNav = false;
  function updateNav(){
    if(_suppressNav) return;
    const s = currentSpread();
    btnP.disabled     = (s<=0);
    btnN.disabled     = (s>=N-1);
    btnFirst.disabled = (s<=0);
    btnLast.disabled  = (s>=N-1);
    info.textContent  = (s+1)+' / '+N;
  }
  pageFlip.on('flip', function(e){
    updateNav();
    const sound = document.getElementById('flipSound');
    if(sound){ sound.currentTime = 0; sound.play().catch(()=>{}); }
  });
  updateNav();

  const sceneEl = document.querySelector('.scene');
  let _animating = false;

  const CONTROLS_H = 235;
  function fitScene(){
    if(isMobile) return;
    const availW = window.innerWidth - 36;
    const availH = Math.max(window.innerHeight - CONTROLS_H, 330);
    const sc = Math.min(1, availW / 1280, availH / 730);
    if(sc < 0.999){
      sceneEl.style.transform = 'scale(' + sc + ')';
      sceneEl.style.transformOrigin = 'top center';
      sceneEl.style.marginBottom = Math.round(730 * (sc - 1)) + 'px';
      document.body.style.justifyContent = 'flex-start';
      document.body.style.paddingTop = '16px';
      document.body.style.gap = '14px';
    } else {
      sceneEl.style.transform = '';
      sceneEl.style.transformOrigin = '';
      sceneEl.style.marginBottom = '';
      document.body.style.justifyContent = '';
      document.body.style.paddingTop = '';
      document.body.style.gap = '';
    }
  }
  window.addEventListener('resize', fitScene);
  fitScene();

  /* Symmetric 3D page fold (mobile). */
  function playFoldAnim(dir, fromIdx, targetIdx){
    if(_animating) return;
    _animating = true; _suppressNav = true;
    const rect = bookEl.getBoundingClientRect();
    const scale = rect.width / 640;
    const duration = 950;
    const faceIdx = dir > 0 ? fromIdx : targetIdx;
    const wrap = document.createElement('div');
    wrap.className = 'bf3-wrap';
    wrap.style.cssText = `left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;height:${rect.height}px;`;
    const flip = document.createElement('div');
    flip.className = 'bf3-flip';
    flip.style.transitionDuration = duration + 'ms';
    flip.style.transform = dir > 0 ? 'rotateY(0deg)' : 'rotateY(-180deg)';
    const front = document.createElement('div');
    front.className = 'bf3-face';
    front.innerHTML = `<div style="width:640px;height:730px;transform-origin:top left;transform:scale(${scale});"><div class="stf-page" style="width:100%;height:100%;">${pageHTMLs[faceIdx] || ''}</div></div>`;
    const back = document.createElement('div');
    back.className = 'bf3-face bf3-back';
    flip.appendChild(front); flip.appendChild(back); wrap.appendChild(flip);
    document.body.appendChild(wrap);
    if(dir > 0){ pageFlip.turnToPage(targetIdx); }
    requestAnimationFrame(() => requestAnimationFrame(() => {
      flip.style.transform = dir > 0 ? 'rotateY(-180deg)' : 'rotateY(0deg)';
    }));
    setTimeout(() => {
      if(dir < 0) pageFlip.turnToPage(targetIdx);
      setTimeout(() => {
        wrap.remove(); _animating = false; _suppressNav = false; updateNav();
      }, 70);
    }, duration + 40);
  }

  function go(dir){
    if(_animating) return;
    if(!isMobile){
      if(dir > 0) pageFlip.flipNext(); else pageFlip.flipPrev();
      return;
    }
    const cur = pageFlip.getCurrentPageIndex();
    const target = cur + dir;
    if(target < 0 || target > TOTAL - 1) return;
    playFoldAnim(dir, cur, target);
  }
  function goTo(spreadIdx){
    if(spreadIdx<0 || spreadIdx>=N) return;
    pageFlip.turnToPage(Math.max(0, spreadIdx * 2 - PAGE_OFF));
  }
  window.go = go;
  window.goTo = goTo;
  window.goLast = () => goTo(N - 1);

  function openReadMode(){
    if(document.getElementById('readModal')) return;
    const idx = pageFlip.getCurrentPageIndex();
    const availW = window.innerWidth - 32;
    const availH = window.innerHeight - 110;
    const scale = Math.min(availW / 640, availH / 730, 1.1);
    const modal = document.createElement('div');
    modal.id = 'readModal'; modal.className = 'read-modal';
    const closeBtn = document.createElement('button');
    closeBtn.className = 'read-modal-close';
    closeBtn.setAttribute('aria-label', 'Close');
    closeBtn.innerHTML = '&times;';
    closeBtn.onclick = closeReadMode;
    const hint = document.createElement('div');
    hint.className = 'read-modal-hint';
    hint.textContent = 'Pinch to zoom';
    const frame = document.createElement('div');
    frame.className = 'read-modal-frame';
    frame.style.width = (640 * scale) + 'px';
    frame.style.height = (730 * scale) + 'px';
    const inner = document.createElement('div');
    inner.className = 'read-modal-inner';
    inner.style.transform = `scale(${scale})`;
    inner.innerHTML = `<div class="stf-page" style="width:var(--PW);height:var(--PH);">${pageHTMLs[idx] || ''}</div>`;
    frame.appendChild(inner);
    modal.appendChild(closeBtn); modal.appendChild(hint); modal.appendChild(frame);
    document.body.appendChild(modal);
    document.body.style.overflow = 'hidden';
  }
  function closeReadMode(){
    const modal = document.getElementById('readModal');
    if(modal) modal.remove();
    document.body.style.overflow = '';
  }
  window.openReadMode = openReadMode;
  window.closeReadMode = closeReadMode;

  document.addEventListener('keydown', e=>{
    if(e.key==='ArrowRight') go(1);
    if(e.key==='ArrowLeft')  go(-1);
  });

  ['pointerdown','mousedown','touchstart'].forEach(evt=>{
    document.addEventListener(evt, e=>{
      if(e.target.closest('.toc-row.go')){ e.stopPropagation(); }
    }, true);
  });

  if(isMobile){
    const touches = new Set();
    let firstTouchPos = null;
    let pageIdxBeforeTouch = null;
    let pinching = false;

    function abortStpfDrag(){
      const p = firstTouchPos || {clientX: 0, clientY: 0};
      try { window.dispatchEvent(new MouseEvent('mouseup', {bubbles:true, cancelable:true, clientX:p.clientX, clientY:p.clientY})); } catch(e){}
      try {
        const ev = new TouchEvent('touchend', {bubbles:true, cancelable:true, touches:[], targetTouches:[], changedTouches:[]});
        window.dispatchEvent(ev);
      } catch(e){
        try {
          const ev = new Event('touchend', {bubbles:true, cancelable:true});
          Object.defineProperty(ev, 'touches', {value: []});
          Object.defineProperty(ev, 'targetTouches', {value: []});
          Object.defineProperty(ev, 'changedTouches', {value: []});
          window.dispatchEvent(ev);
        } catch(e2){}
      }
      const before = pageIdxBeforeTouch;
      if(before != null){
        setTimeout(() => {
          if(pageFlip.getCurrentPageIndex() !== before){
            _suppressNav = true; pageFlip.turnToPage(before); _suppressNav = false; updateNav();
          }
        }, 80);
      }
    }

    document.addEventListener('touchstart', e => {
      if(touches.size === 0){
        const t = e.changedTouches[0];
        firstTouchPos = {clientX: t.clientX, clientY: t.clientY};
        pageIdxBeforeTouch = pageFlip.getCurrentPageIndex();
      }
      for(const t of e.changedTouches) touches.add(t.identifier);
      if(touches.size >= 2 && !pinching){ pinching = true; abortStpfDrag(); }
      if(pinching) e.stopImmediatePropagation();
    }, {capture: true});

    document.addEventListener('touchmove', e => {
      if(e.touches.length >= 2 && !pinching){ pinching = true; abortStpfDrag(); }
      if(pinching) e.stopImmediatePropagation();
    }, {capture: true});

    document.addEventListener('touchend', e => {
      for(const t of e.changedTouches) touches.delete(t.identifier);
      if(pinching){
        e.stopImmediatePropagation();
        if(touches.size === 0) setTimeout(() => { pinching = false; }, 150);
      }
    }, {capture: true});

    document.addEventListener('touchcancel', e => {
      for(const t of e.changedTouches) touches.delete(t.identifier);
      if(touches.size === 0) pinching = false;
    }, {capture: true});

    let _cornerBackId = null;
    let _cornerStart = null;

    bookEl.addEventListener('pointerdown', e => {
      if(e.pointerType !== 'touch') return;
      if(_animating || pinching) return;
      const rect = bookEl.getBoundingClientRect();
      const x = e.clientX - rect.left;
      if(x < rect.width * 0.25 && pageFlip.getCurrentPageIndex() > 0){
        e.stopImmediatePropagation();
        _cornerBackId = e.pointerId;
        _cornerStart = {x: e.clientX, y: e.clientY};
      }
    }, {capture: true});

    bookEl.addEventListener('touchstart', e => {
      if(_animating || pinching){ e.stopImmediatePropagation(); return; }
      if(_cornerBackId !== null) e.stopImmediatePropagation();
    }, {capture: true});

    document.addEventListener('pointermove', e => {
      if(e.pointerId !== _cornerBackId || !_cornerStart) return;
      const dx = Math.abs(e.clientX - _cornerStart.x);
      const dy = Math.abs(e.clientY - _cornerStart.y);
      if(dx > 20 || dy > 20){ _cornerBackId = null; _cornerStart = null; }
    }, {capture: true});

    document.addEventListener('pointerup', e => {
      if(e.pointerId !== _cornerBackId) return;
      _cornerBackId = null; _cornerStart = null;
      if(pinching) return;
      go(-1);
    }, {capture: true});

    document.addEventListener('pointercancel', e => {
      if(e.pointerId === _cornerBackId){ _cornerBackId = null; _cornerStart = null; }
    }, {capture: true});
  }
});

</script>
